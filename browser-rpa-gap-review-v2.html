<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RPA 도입 갭 검토 V2</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --line: #dce3ea;
      --line-strong: #c5d0dc;
      --text: #1e293b;
      --muted: #51607a;
      --soft: #eef3f8;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --blue-ink: #1d4ed8;
      --green: #0f9f6e;
      --green-soft: #e7f8f0;
      --green-ink: #0a7350;
      --amber: #b7791f;
      --amber-soft: #fff5dc;
      --amber-ink: #875200;
      --red: #c24141;
      --red-soft: #fdecec;
      --red-ink: #a52d2d;
      --purple: #6d5bd0;
      --purple-soft: #f0edff;
      --shadow: 0 1px 2px rgba(15, 23, 42, .06), 0 10px 30px rgba(15, 23, 42, .05);
      --radius: 8px;
      --sidebar: 276px;
      font-family: Inter, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: var(--bg); color: var(--text); font-size: 14px; }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 4px; }

    .app { display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: var(--surface);
      border-right: 1px solid var(--line);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 8px 10px 10px; }
    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
    }
    .brand strong { display: block; font-size: 15px; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .scope-box {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .nav-group { display: grid; gap: 4px; }
    .nav-group-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 2px 10px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      color: var(--muted);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .nav-link:hover { background: var(--soft); color: var(--text); }
    .nav-link.active { background: var(--blue-soft); color: var(--blue); font-weight: 700; }
    .nav-icon {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1px solid var(--line-strong);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
      background: var(--surface);
      color: var(--muted);
      flex: none;
    }
    .nav-link.active .nav-icon { border-color: var(--blue); background: var(--blue); color: #fff; }

    .main { min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .topbar h1 { margin: 0; font-size: 18px; }
    .topbar .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .top-actions { display: inline-flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .content { padding: 24px; display: grid; gap: 16px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.green { background: var(--green-soft); color: var(--green-ink); }
    .badge.amber { background: var(--amber-soft); color: var(--amber-ink); }
    .badge.red { background: var(--red-soft); color: var(--red-ink); }
    .badge.blue { background: var(--blue-soft); color: var(--blue-ink); }
    .badge.purple { background: var(--purple-soft); color: var(--purple); }
    .badge.muted { background: var(--soft); color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      min-height: 34px;
    }
    .btn:hover { background: var(--soft); }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.danger { border-color: var(--red); color: var(--red-ink); background: var(--red-soft); }
    .btn.small { min-height: 30px; padding: 5px 9px; font-size: 12px; }

    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .panel-head {
      min-height: 54px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel-head h2 { margin: 0; font-size: 14px; }
    .panel-head p, .muted { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .panel-body { padding: 16px; }
    .subtle { color: var(--muted); font-size: 12px; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; }

    .hero {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(330px, .75fr);
      gap: 16px;
      padding: 18px;
      align-items: stretch;
    }
    .hero h2 { margin: 0; font-size: 20px; line-height: 1.35; }
    .hero p { margin: 9px 0 0; color: var(--muted); line-height: 1.65; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .decision-board {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .decision-row { display: grid; grid-template-columns: 92px minmax(0, 1fr); gap: 8px; align-items: start; }
    .decision-row strong { font-size: 12px; }
    .decision-row span { color: var(--muted); font-size: 12px; line-height: 1.45; }

    .metrics { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; }
    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      min-height: 110px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { font-size: 26px; font-weight: 850; letter-spacing: 0; }
    .metric .note { color: var(--muted); font-size: 12px; line-height: 1.45; }

    .grid-2 { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; }

    .card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 9px;
    }
    .card h3 { margin: 0; font-size: 13px; line-height: 1.35; }
    .card p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 12px; }
    .card-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .segmented { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      padding: 7px 10px;
      cursor: pointer;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active { background: var(--blue-soft); color: var(--blue); font-weight: 800; }
    .search, .select {
      min-width: min(100%, 220px);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 7px 9px;
      background: var(--surface);
      color: var(--text);
    }

    .table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 920px; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 12px; font-weight: 800; background: var(--surface-2); }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr.selected td { background: var(--blue-soft); }
    td strong { display: block; margin-bottom: 3px; }
    td .desc { color: var(--muted); line-height: 1.45; }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 16px;
      align-items: start;
    }
    .sticky { position: sticky; top: 86px; }
    .detail-stack { display: grid; gap: 12px; }
    .detail-card { border: 1px solid var(--line); background: var(--surface-2); border-radius: var(--radius); padding: 12px; }
    .detail-card h3 { margin: 0 0 8px; font-size: 13px; }
    .detail-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }

    .field-grid { display: grid; grid-template-columns: 110px minmax(0, 1fr); gap: 8px; font-size: 13px; }
    .field-grid dt { color: var(--muted); }
    .field-grid dd { margin: 0; overflow-wrap: anywhere; }

    .kanban { display: grid; grid-template-columns: repeat(4, minmax(220px, 1fr)); gap: 12px; }
    .kanban-col { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface-2); min-height: 360px; }
    .kanban-head { padding: 10px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .kanban-head strong { font-size: 13px; }
    .kanban-body { padding: 10px; display: grid; gap: 8px; }
    .idea-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 10px; display: grid; gap: 8px; }
    .idea-card strong { font-size: 13px; }
    .idea-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }

    .timeline { display: grid; gap: 10px; }
    .timeline-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .index-dot {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--muted);
      font-weight: 850;
      font-size: 12px;
    }
    .timeline-item strong { display: block; margin-bottom: 3px; }
    .timeline-item p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }

    .bar-list { display: grid; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 130px minmax(0, 1fr) 54px; gap: 10px; align-items: center; font-size: 12px; }
    .bar-track { height: 8px; background: var(--soft); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--blue); border-radius: 999px; }
    .bar-fill.green { background: var(--green); }
    .bar-fill.amber { background: var(--amber); }
    .bar-fill.red { background: var(--red); }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(180px, 1fr)); gap: 10px; }
    .field { display: grid; gap: 5px; }
    .field span { color: var(--muted); font-size: 12px; font-weight: 800; }
    .field input, .field select, .field textarea {
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 8px 9px;
      width: 100%;
      min-width: 0;
    }
    .field textarea { min-height: 92px; resize: vertical; }
    .field-wide { grid-column: 1 / -1; }

    .screen { display: none; }
    .screen.active { display: grid; gap: 16px; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      width: min(420px, calc(100vw - 36px));
      display: grid;
      gap: 8px;
      pointer-events: none;
    }
    .toast-item {
      pointer-events: auto;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      box-shadow: 0 18px 45px rgba(15, 23, 42, .18);
      padding: 11px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .toast-item strong { display: block; font-size: 13px; }
    .toast-item span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.35; }

    .drawer {
      position: fixed;
      top: 74px;
      right: 16px;
      bottom: 16px;
      z-index: 60;
      width: min(560px, calc(100vw - 32px));
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 22px 70px rgba(15, 23, 42, .22);
      display: none;
      overflow: hidden;
    }
    .drawer.open { display: flex; flex-direction: column; }
    .drawer-head { padding: 13px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .drawer-head h2 { margin: 0; font-size: 15px; }
    .drawer-body { padding: 14px; overflow: auto; display: grid; gap: 12px; }

    .notice {
      border: 1px solid var(--amber);
      background: var(--amber-soft);
      color: var(--amber-ink);
      border-radius: var(--radius);
      padding: 11px 12px;
      line-height: 1.55;
    }
    .notice strong { color: var(--text); }

    @media (max-width: 1180px) {
      .hero, .split, .grid-2 { grid-template-columns: 1fr; }
      .sticky { position: static; }
      .metrics, .grid-4 { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
      .grid-3, .kanban { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; overflow: visible; border-right: 0; border-bottom: 1px solid var(--line); }
      .nav-group { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav-group-label { grid-column: 1 / -1; }
      .topbar { padding: 12px 14px; align-items: flex-start; flex-wrap: wrap; }
      .content { padding: 14px; }
    }
    @media (max-width: 620px) {
      .metrics, .grid-3, .grid-4, .kanban, .form-grid { grid-template-columns: 1fr; }
      .decision-row, .field-grid, .bar-row { grid-template-columns: 1fr; }
      .timeline-item { grid-template-columns: 34px minmax(0, 1fr); }
      .timeline-item .badge { grid-column: 2; justify-self: start; }
      .segmented { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); }
      .segmented button { padding-left: 4px; padding-right: 4px; }
      .search, .select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">R2</div>
        <div>
          <strong>RPA 도입 평가</strong>
          <span>Enterprise gap review</span>
        </div>
      </div>
      <div class="scope-box">
        <span class="badge blue">브라우저 RPA 중심</span>
        <span class="badge muted">데스크톱 자동화는 별도 전략</span>
      </div>
      <nav aria-label="주요 화면" id="side-nav"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Executive Overview</h1>
          <div class="sub" id="page-subtitle">도입 판단에 필요한 핵심 갭과 보강 우선순위를 한 화면에서 봅니다.</div>
        </div>
        <div class="top-actions">
          <button class="btn small" type="button" data-action="export">검토본 내보내기</button>
          <button class="btn small" type="button" data-route="roadmap">보강 순서 보기</button>
          <button class="btn primary small" type="button" data-action="decision">도입 판단 기록</button>
        </div>
      </header>

      <div class="content">
        <section class="screen" id="view-overview" aria-label="Executive Overview"></section>
        <section class="screen" id="view-matrix" aria-label="Gap Matrix"></section>
        <section class="screen" id="view-coe" aria-label="CoE ROI"></section>
        <section class="screen" id="view-scheduler" aria-label="Scheduler Bot Pool"></section>
        <section class="screen" id="view-idp" aria-label="IDP"></section>
        <section class="screen" id="view-connectors" aria-label="Connectors"></section>
        <section class="screen" id="view-nocode" aria-label="No-code UX"></section>
        <section class="screen" id="view-ops" aria-label="Operations SLA"></section>
        <section class="screen" id="view-governance" aria-label="Governance"></section>
        <section class="screen" id="view-roadmap" aria-label="Roadmap"></section>
      </div>
    </main>
  </div>

  <aside class="drawer" id="drawer" aria-live="polite">
    <div class="drawer-head">
      <div>
        <h2 id="drawer-title">상세</h2>
        <p class="muted" id="drawer-subtitle">선택한 항목의 개발 메모입니다.</p>
      </div>
      <button class="btn small" type="button" data-action="close-drawer">닫기</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
  <div class="toast" id="toast"></div>

  <script>
    const routes = [
      { id: "overview", group: "도입 판단", icon: "EX", title: "Executive", subtitle: "도입 가능 범위와 차단 갭을 요약합니다." },
      { id: "matrix", group: "도입 판단", icon: "GM", title: "Gap Matrix", subtitle: "경쟁 대비 갭을 반영, 재분류, 제외로 관리합니다." },
      { id: "coe", group: "전략/발굴", icon: "CO", title: "CoE / ROI", subtitle: "업무 발굴, 승인 파이프라인, ROI를 관리합니다." },
      { id: "scheduler", group: "운영", icon: "SC", title: "스케줄 / 봇 풀", subtitle: "무인 실행, 이벤트 트리거, 용량을 설계합니다." },
      { id: "idp", group: "업무 확장", icon: "ID", title: "문서 자동화 / IDP", subtitle: "문서 분류, OCR, 검증 큐를 제품화합니다." },
      { id: "connectors", group: "업무 확장", icon: "CX", title: "커넥터 카탈로그", subtitle: "HTTP API와 업무 템플릿 생태계를 정의합니다." },
      { id: "nocode", group: "제작 UX", icon: "UX", title: "비개발자 UX", subtitle: "기술 ID와 JSON을 선택형 업무 언어로 바꿉니다." },
      { id: "ops", group: "운영", icon: "OP", title: "실시간 운영 / SLA", subtitle: "알림, SLA 위험, 워커 상태를 운영 화면으로 올립니다." },
      { id: "governance", group: "보안/통제", icon: "GV", title: "거버넌스", subtitle: "SSO, 감사, RBAC, SecretRef 운영을 보강합니다." },
      { id: "roadmap", group: "실행 계획", icon: "RM", title: "보강 Roadmap", subtitle: "P0부터 상용화 준비도까지 순서를 정리합니다." }

    function bindMatrix() {
      const body = document.getElementById("gap-body");
      const search = document.getElementById("gap-search");
      const buttons = Array.from(document.querySelectorAll("[data-filter]"));
      function rows() {
        const keyword = (search?.value || "").trim().toLowerCase();
        return gapItems.filter((item) => {
          const filterMatch = currentFilter === "all" || item.decision === currentFilter;
          const text = [item.name, item.domain, item.impact, item.action].join(" ").toLowerCase();
          return filterMatch && text.includes(keyword);
        });
      }
      function renderRows() {
        const out = rows();
        body.innerHTML = out.map((item) => {
          const d = decisionLabel(item.decision);
          return `
            <tr class="${item.id === selectedGap ? "selected" : ""}" data-gap="${item.id}">
              <td><strong>${item.name}</strong><span class="desc">${item.impact}</span></td>
              <td>${badge(d.text, d.tone)}</td>
              <td>${badge(item.priority, priorityTone(item.priority))}</td>
              <td>${item.domain}</td>
              <td><span class="desc">${item.action}</span></td>
              <td><button class="btn small" type="button" data-open-gap="${item.id}">상세</button></td>
            </tr>
          `;
        }).join("");
        body.querySelectorAll("tr[data-gap]").forEach((row) => {
          row.addEventListener("click", (event) => {
            if (event.target.closest("button")) return;
            selectGap(row.dataset.gap);
          });
        });
        body.querySelectorAll("[data-open-gap]").forEach((button) => {
          button.addEventListener("click", () => selectGap(button.dataset.openGap));
        });
      }
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.filter;
          buttons.forEach((b) => b.classList.toggle("active", b === button));
          const first = rows()[0];
          if (first && !rows().some((item) => item.id === selectedGap)) selectedGap = first.id;
          renderRows();
          selectGap(selectedGap, false);
        });
      });
      if (search) search.addEventListener("input", () => {
        const first = rows()[0];
        if (first && !rows().some((item) => item.id === selectedGap)) selectedGap = first.id;
        renderRows();
        selectGap(selectedGap, false);
      });
      function selectGap(id, rerender = true) {
        const item = gapItems.find((g) => g.id === id) || gapItems[0];
        selectedGap = item.id;
        const d = decisionLabel(item.decision);
        document.getElementById("gap-detail-title").textContent = item.name;
        const detailBadge = document.getElementById("gap-detail-badge");
        detailBadge.textContent = d.text;
        detailBadge.className = `badge ${d.tone}`;
        document.getElementById("gap-detail-priority").innerHTML = badge(item.priority, priorityTone(item.priority));
        document.getElementById("gap-detail-domain").textContent = item.domain;
        document.getElementById("gap-detail-done").textContent = item.done;
        document.getElementById("gap-detail-impact").textContent = item.impact;
        document.getElementById("gap-detail-action").textContent = item.action;
        if (rerender) renderRows();
      }
      window.selectGap = selectGap;
      renderRows();
      selectGap(selectedGap, false);
    }

    function govCard(title, text, p) {
      return `<article class="card"><div class="card-meta">${badge("거버넌스", "blue")}${badge(p, priorityTone(p))}</div><h3>${title}</h3><p>${text}</p><button class="btn small" type="button" data-action="open-governance">세부 정책 보기</button></article>`;
    }

    function renderRoadmap() {
      document.getElementById("view-roadmap").innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h2>보강 우선순위 V2</h2><p>기업 도입 평가에서 바로 감점되는 항목부터 정리했습니다.</p></div><button class="btn primary" type="button" data-action="roadmap-export">Roadmap Export</button></div>
          <div class="panel-body timeline">
            ${timeline("1", "스케줄/이벤트 트리거", "무인 실행성과 봇 풀 운영의 시작점입니다.", "P0")}
            ${timeline("2", "기술 ID/JSON 제거 + 브라우저 레코더", "현업 시민 개발자가 쓸 수 있는 제작 UX를 만듭니다.", "P0")}
            ${timeline("3", "PbD 승격 버튼 + HTTP api_call 실행기", "차별점을 제품화하고 headless 연동을 엽니다.", "P0/P1")}
            ${timeline("4", "CoE/ROI 파이프라인", "어떤 업무를 자동화할지와 투자 효과를 보여줍니다.", "P1")}
            ${timeline("5", "HITL/IDP/SLA 알림", "문서 검증과 운영 예외를 닫힌 루프로 만듭니다.", "P1")}
            ${timeline("6", "커넥터/ALM/거버넌스 고도화", "전사 표준 플랫폼으로 확장하는 기반입니다.", "P2/P3")}
          </div>
        </section>
        <section class="grid-2">
          <div class="panel"><div class="panel-head"><h2>도입 판단</h2></div><div class="panel-body decision-board"><div class="decision-row"><strong>지금 가능</strong><span>제한된 브라우저 PoC, 감사/승인 추적이 중요한 업무</span></div><div class="decision-row"><strong>보강 후</strong><span>현업 확산, 문서 자동화, 무인 운영, 커넥터 기반 확장</span></div><div class="decision-row"><strong>별도 전략</strong><span>데스크톱/Attended, ERP 클라이언트, 레거시 GUI</span></div></div></div>
          <div class="panel"><div class="panel-head"><h2>상용화 준비도</h2></div><div class="panel-body bar-list">${bar("제품 UX", 48, "amber")}${bar("운영 자동화", 36, "red")}${bar("보안 코어", 82, "green")}${bar("생태계/ALM", 28, "red")}</div></div>
        </section>
      `;
    }

    function renderAll() {
      renderOverview();
      renderMatrix();
      renderCoe();
      renderScheduler();
      renderIdp();
      renderConnectors();
      renderNocode();
      renderOps();
      renderGovernance();
      renderRoadmap();
    }

    function miniCard(title, text) {
      return `<article class="card"><h3>${title}</h3><p>${text}</p><button class="btn small" type="button" data-action="mini-detail">상세</button></article>`;
    }

    function bar(label, pct, tone) {
      return `<div class="bar-row"><span>${label}</span><div class="bar-track"><div class="bar-fill ${tone}" style="width:${pct}%"></div></div><strong>${pct}%</strong></div>`;
    }

    function timeline(num, title, text, state) {
      const tone = state === "P0" || state === "P0/P1" ? "red" : state === "P1" || state === "설계" || state === "진행" ? "amber" : state === "P2/P3" ? "purple" : "blue";
      return `<div class="timeline-item"><span class="index-dot">${num}</span><div><strong>${title}</strong><p>${text}</p></div>${badge(state, tone)}</div>`;
    }

    function activateRoute(routeId) {
      const route = routes.find((r) => r.id === routeId) || routes[0];
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.remove("active"));
      document.getElementById(`view-${route.id}`).classList.add("active");
      document.querySelectorAll("[data-nav]").forEach((link) => link.classList.toggle("active", link.dataset.nav === route.id));
      document.getElementById("page-title").textContent = route.title;
      document.getElementById("page-subtitle").textContent = route.subtitle;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function currentRoute() {
      return (location.hash || "#overview").replace("#", "") || "overview";
    }

    function bindGlobalActions() {
      document.body.addEventListener("click", (event) => {
        const routeButton = event.target.closest("[data-route]");
        if (routeButton) {
          go(routeButton.dataset.route);
          return;
        }
        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const action = actionButton.dataset.action;
        if (action === "close-drawer") return closeDrawer();
        if (action === "create-ticket") return openGapTicket();
        if (action === "decision") return openDrawer("도입 판단 기록", "검토 회의에서 바로 남기는 의사결정 메모입니다.", `<div class="form-grid"><label class="field"><span>판단</span><select><option>제한 PoC 승인</option><option>보강 후 재검토</option><option>도입 보류</option></select></label><label class="field"><span>오너</span><input value="RPA CoE" /></label><label class="field field-wide"><span>메모</span><textarea>브라우저 PoC는 진행하되, 전사 표준 전에는 스케줄/CoE/IDP/SLA 보강을 선행한다.</textarea></label></div><button class="btn primary" type="button" data-action="save-decision">기록 저장</button>`);
        const messages = {
          export: ["검토본 내보내기", "V2 갭 검토 요약을 생성한 것처럼 표시했습니다."],
          "new-idea": ["후보 업무 접수", "CoE 파이프라인에 새 자동화 후보 입력 화면을 열었습니다."],
          "roi-calc": ["ROI 계산식", "처리 시간, 빈도, 예외율, 개발 난이도를 기준으로 산정합니다."],
          "approve-pipeline": ["승인 라우팅", "업무 오너, 보안, CoE 승인 단계를 설정했습니다."],
          "open-idea": ["후보 상세", "자동화 후보 상세 패널을 열었습니다."],
          "new-schedule": ["스케줄 추가", "무인 실행 트리거 생성 플로우가 시작되었습니다."],
          "simulate-run": ["실행 시뮬레이션", "다음 실행 시간과 봇 풀 점유를 계산했습니다."],
          "scale-pool": ["봇 풀 용량 조정", "피크 시간대 용량 증설 요청을 생성했습니다."],
          "trigger-test": ["트리거 테스트", "이벤트 수신과 큐 적재 조건을 검증했습니다."],
          "upload-doc": ["문서 샘플 업로드", "IDP 샘플 문서를 업로드한 것처럼 처리했습니다."],
          "open-validation": ["검증 큐", "문서 필드 교정 큐 화면을 열었습니다."],
          "idp-model": ["IDP 모델 설정", "문서 분류와 필드 추출 모델 설정을 열었습니다."],
          "validate-doc": ["문서 검증", "선택한 문서를 HITL 검증 화면으로 보냈습니다."],
          "request-connector": ["커넥터 요청", "1st-party 커넥터 후보 요청을 등록했습니다."],
          "connector-detail": ["커넥터 상세", "인증 방식, 입력값, 실패 정책을 확인합니다."],
          "template-copy": ["템플릿 복사", "브라우저 업무 템플릿을 새 자동화 초안으로 복사했습니다."],
          "preview-wizard": ["마법사 미리보기", "기술 ID 없는 자동화 만들기 플로우를 열었습니다."],
          "save-draft": ["초안 저장", "현업용 입력값으로 자동화 초안을 저장했습니다."],
          "send-alert": ["알림 테스트", "Teams/Slack/메일 알림을 보낸 것처럼 표시했습니다."],
          "route-alert": ["알림 라우팅", "SLA 위험 알림 라우팅 정책을 설정했습니다."],
          "audit-export": ["감사 리포트", "감사 증적 export 작업을 시작했습니다."],
          "open-governance": ["정책 상세", "거버넌스 정책 상세 패널을 열었습니다."],
          "roadmap-export": ["Roadmap Export", "보강 순서와 책임자를 포함한 문서를 생성했습니다."],
          "save-decision": ["도입 판단 저장", "검토 회의 메모를 저장했습니다."],
          "mini-detail": ["상세 보기", "선택한 항목의 세부 요구사항을 확인합니다."]
        };
        const msg = messages[action] || ["동작 완료", "버튼이 실제 제품처럼 반응하도록 연결되어 있습니다."];
        showToast(msg[0], msg[1]);
      });
    }

    function openGapTicket() {
      const item = gapItems.find((g) => g.id === selectedGap) || gapItems[0];
      openDrawer("개발 티켓 만들기", item.name, `
        <dl class="field-grid"><dt>우선순위</dt><dd>${badge(item.priority, priorityTone(item.priority))}</dd><dt>영역</dt><dd>${item.domain}</dd><dt>완료 기준</dt><dd>${item.done}</dd></dl>
        <div class="detail-card"><h3>요구사항</h3><p>${item.action}</p></div>
        <div class="detail-card"><h3>리스크</h3><p>${item.impact}</p></div>
        <button class="btn primary" type="button" data-action="save-decision">티켓 저장</button>
      `);
    }

    function boot() {
      renderNav();
      renderAll();
      bindGlobalActions();
      window.addEventListener("hashchange", () => activateRoute(currentRoute()));
      activateRoute(currentRoute());
    }

    boot();
  </script>
</body>
</html>
