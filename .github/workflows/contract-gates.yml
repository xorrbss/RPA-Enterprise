name: Contract Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  contract-lint:
    name: Root contract lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check authoritative contracts
        run: node scripts/contract-lint.mjs

      - name: Audit app test wiring (no CI-orphan tests)
        run: node scripts/test-wiring-audit.mjs

  blocked-decision-audit:
    name: Blocked decision audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check blocked release decisions
        run: node scripts/blocked-decisions-audit.mjs

  codegen:
    name: Codegen typecheck, fixtures, validators, consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: codegen/package-lock.json

      - name: Install codegen dependencies
        run: npm ci --prefix codegen

      - name: Typecheck generated and shared TS contracts
        run: npm --prefix codegen run typecheck

      - name: Run state-machine fixtures
        run: npm --prefix codegen run fixtures

      - name: Run schema and static-validation fixtures
        run: npm --prefix codegen run validators

      - name: Run cross-contract consistency
        run: npm --prefix codegen run consistency

      - name: Lint OpenAPI/AsyncAPI specs (spectral)
        run: npm --prefix codegen run spectral

      - name: Run full codegen test gate
        run: npm --prefix codegen test

  yaml-parse:
    name: Workflow, OpenAPI, and AsyncAPI YAML parse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes python3-yaml

      - name: Parse YAML artifacts
        run: python3 scripts/yaml-parse.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check secret scan workflow hazard fixtures
        run: node scripts/secret-scan.mjs --self-test

      - name: Check staging release packet validator fixtures
        run: node scripts/validate-staging-release-packet.mjs --self-test

      - name: Scan for high-risk secret material and staging workflow hazards
        run: node scripts/secret-scan.mjs

  db-static-smoke:
    name: DB static smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check migration contracts without PostgreSQL
        run: node scripts/db-static-smoke.mjs

  db-migration-smoke:
    name: PostgreSQL 15 migration smoke
    runs-on: ubuntu-latest
    # These visible postgres/rpa_smoke values are isolated service-container
    # credentials for CI smoke only. They are not staging SecretStore
    # provisioning evidence and must not be reused for deploy/runtime material.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: rpa_contract_gate
      PGADMIN_USER: postgres
      PGSMOKE_USER: rpa_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Show db:smoke requirements
        shell: bash
        run: |
          set -euo pipefail
          echo "db:smoke requires a PostgreSQL 15+ server and psql client."
          echo "CI provides postgres:15 at PGHOST=${PGHOST}, PGPORT=${PGPORT}, PGDATABASE=${PGDATABASE}."
          echo "CI runs db:smoke as ${PGSMOKE_USER}, a non-SUPERUSER/non-BYPASSRLS role, so RLS/redaction assertions are not skipped."
          echo "Release evidence command: npm --prefix codegen run db:smoke:release or node scripts/db-migration-smoke.mjs --require-non-bypass."
          echo "Local full equivalents: npm --prefix codegen run ci:local:temp-db, or ci:local when PG env already points at a non-bypass role; ci:local:no-db is diagnostic skip-only."
          psql --version
          pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGADMIN_USER}" -d postgres

      - name: Prepare non-bypass db:smoke role and database
        shell: bash
        env:
          PGADMIN_PASSWORD: postgres
          PGSMOKE_PASSWORD: rpa_smoke
        run: |
          set -euo pipefail
          echo "::add-mask::${PGADMIN_PASSWORD}"
          echo "::add-mask::${PGSMOKE_PASSWORD}"
          export PGUSER="${PGADMIN_USER}"
          export PGPASSWORD="${PGADMIN_PASSWORD}"
          psql -v ON_ERROR_STOP=1 -d postgres <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'rpa_smoke') THEN
              CREATE ROLE rpa_smoke LOGIN PASSWORD 'rpa_smoke'
                NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            ELSE
              ALTER ROLE rpa_smoke LOGIN PASSWORD 'rpa_smoke'
                NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            END IF;
          END;
          $$;
          SQL
          psql -v ON_ERROR_STOP=1 -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '${PGDATABASE}'" | grep -q 1 || createdb --owner "${PGSMOKE_USER}" "${PGDATABASE}"
          psql -v ON_ERROR_STOP=1 -d postgres -c "ALTER DATABASE ${PGDATABASE} OWNER TO ${PGSMOKE_USER}"
          psql -v ON_ERROR_STOP=1 -d postgres -Atqc "SELECT rolsuper OR rolbypassrls FROM pg_roles WHERE rolname = '${PGSMOKE_USER}'" | grep -qx f

      - name: Run migration contract smoke
        env:
          PGUSER: ${{ env.PGSMOKE_USER }}
          PGPASSWORD: rpa_smoke
        run: node scripts/db-migration-smoke.mjs --require-non-bypass

  app-runtime:
    name: App runtime typecheck and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: rpa_contract_gate
      PGADMIN_USER: postgres
      PGSMOKE_USER: rpa_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            codegen/package-lock.json
            app/package-lock.json

      - name: Install codegen dependencies
        run: npm ci --prefix codegen

      - name: Install app dependencies
        run: npm ci --prefix app

      - name: Typecheck app runtime
        run: npm --prefix app run typecheck

      - name: Typecheck dev tooling (dev/ — previously typecheck-blind)
        run: npm --prefix app run typecheck:dev

      - name: Lint app runtime (secret-taint gate)
        run: npm --prefix app run lint

      - name: Run app unit tests
        run: npm --prefix app run test:unit

      - name: Locate Chrome for D3 executor dry-run
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "${CHROME}" ]; then
            echo "Chrome or Chromium is required for npm --prefix app run test:executor"
            exit 1
          fi
          echo "CHROME_PATH=${CHROME}" >> "${GITHUB_ENV}"

      - name: Run D3 executor dry-run tests
        run: npm --prefix app run test:executor

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Prepare non-bypass app integration role and database
        shell: bash
        env:
          PGADMIN_PASSWORD: postgres
          PGSMOKE_PASSWORD: rpa_smoke
        run: |
          set -euo pipefail
          echo "::add-mask::${PGADMIN_PASSWORD}"
          echo "::add-mask::${PGSMOKE_PASSWORD}"
          export PGUSER="${PGADMIN_USER}"
          export PGPASSWORD="${PGADMIN_PASSWORD}"
          psql -v ON_ERROR_STOP=1 -d postgres <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'rpa_smoke') THEN
              CREATE ROLE rpa_smoke LOGIN PASSWORD 'rpa_smoke'
                NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            ELSE
              ALTER ROLE rpa_smoke LOGIN PASSWORD 'rpa_smoke'
                NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
            END IF;
          END;
          $$;
          SQL
          psql -v ON_ERROR_STOP=1 -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '${PGDATABASE}'" | grep -q 1 || createdb --owner "${PGSMOKE_USER}" "${PGDATABASE}"
          psql -v ON_ERROR_STOP=1 -d postgres -c "ALTER DATABASE ${PGDATABASE} OWNER TO ${PGSMOKE_USER}"
          psql -v ON_ERROR_STOP=1 -d postgres -Atqc "SELECT rolsuper OR rolbypassrls FROM pg_roles WHERE rolname = '${PGSMOKE_USER}'" | grep -qx f

      - name: Run app integration tests
        env:
          PGUSER: ${{ env.PGSMOKE_USER }}
          PGPASSWORD: rpa_smoke
          # superuser 비밀번호: runtime-worker-claim.int가 BYPASSRLS 역할 생성에 postgres로 접속(격리 service-container 자격).
          PGADMIN_PASSWORD: postgres
        run: npm --prefix app run test:int

      # 풀스택 D3 파이프라인(driver + 실 Chrome + DB) — CHROME_PATH(Locate Chrome 단계)와 비-bypass DB가
      # 둘 다 준비된 뒤 실행. test:int(순수-DB)와 분리해 명시·격리(플레이키 시 RQ-001 규율로 rerun).
      - name: Run full-stack D3 run-pipeline integration (driver + Chrome + DB)
        env:
          PGUSER: ${{ env.PGSMOKE_USER }}
          PGPASSWORD: rpa_smoke
        run: |
          npm --prefix app run test:pipeline-run
          npm --prefix app run test:pipeline-site

      - name: Install and build console for live e2e
        run: |
          npm ci --prefix web
          npm --prefix web run build

      - name: Run console live e2e (browser to API to PostgreSQL)
        env:
          PGUSER: ${{ env.PGSMOKE_USER }}
          PGPASSWORD: rpa_smoke
        run: npm --prefix app run test:console-live-e2e

  html-smoke:
    name: HTML console smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Static smoke for standalone console
        run: node scripts/html-smoke.mjs

      - name: Local HTTP smoke for standalone console
        run: node scripts/html-http-smoke.mjs

  console:
    name: Operations console (web) typecheck, tests, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install console dependencies
        run: npm ci --prefix web

      - name: Typecheck console
        run: npm --prefix web run typecheck

      - name: Run console tests
        run: npm --prefix web run test

      - name: Build console
        run: npm --prefix web run build

      - name: Install app dependencies (puppeteer-core for e2e)
        run: npm ci --prefix app

      - name: Locate Chrome for console browser e2e
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "${CHROME}" ]; then
            echo "Chrome or Chromium is required for the console browser e2e"
            exit 1
          fi
          echo "CHROME_PATH=${CHROME}" >> "${GITHUB_ENV}"

      - name: Run console browser e2e
        run: npm --prefix app run test:console-e2e
