asyncapi: '2.6.0'

info:
  title: RPA Enterprise Platform Run Events
  version: '1.3.0'
  description: |
    Tenant-scoped run event bus contract. Channels map 1:1 to the event_type
    enum in schema/event-envelope.schema.json. Payload bodies are closed empty
    objects in v1; identity and correlation fields stay in the EventEnvelope.
    Worker health and circuit telemetry is infrastructure telemetry and is
    not stored in tenant-scoped events_outbox.

defaultContentType: application/json

x-envelope-correlation-contract:
  required:
    - correlation_id
  uuid_fields:
    - correlation_id
    - causation_id
  transport_header_mirrors:
    required:
      - correlation_id
      - idempotency_key
    optional:
      - ordering_key
      - causation_id
  optional_for_runless_events:
    - ordering_key

x-step-reference-contract:
  canonical_key: "(tenant_id, run_id, step_id, attempt)"
  applies_to:
    - step.started
    - step.completed
    - step.verify.failed
  required_envelope_fields:
    - tenant_id
    - run_id
    - step_id
    - attempt
  surrogate_run_step_id: false

x-event-payload-registry:
  run.created: events/run.created@1
  run.started: events/run.started@1
  run.suspended: events/run.suspended@1
  run.resume_requested: events/run.resume_requested@1
  run.resumed: events/run.resumed@1
  run.cancelled: events/run.cancelled@1
  run.completed: events/run.completed@1
  run.failed_business: events/run.failed_business@1
  run.failed_system: events/run.failed_system@1
  step.started: events/step.started@1
  step.completed: events/step.completed@1
  step.verify.failed: events/step.verify.failed@1
  llm.stream.started: events/llm.stream.started@1
  llm.stream.completed: events/llm.stream.completed@1
  llm.stream.aborted: events/llm.stream.aborted@1
  challenge.detected: events/challenge.detected@1
  challenge.resolved: events/challenge.resolved@1
  human_task.created: events/human_task.created@1
  human_task.resolved: events/human_task.resolved@1
  human_task.expired: events/human_task.expired@1
  human_task.escalated: events/human_task.escalated@1
  workitem.completed: events/workitem.completed@1
  workitem.dead_lettered: events/workitem.dead_lettered@1
  pipeline.stage.completed: events/pipeline.stage.completed@1
  sink.delivered: events/sink.delivered@1
  sink.dead_lettered: events/sink.dead_lettered@1
  site.circuit_opened: events/site.circuit_opened@1
  site.circuit_closed: events/site.circuit_closed@1

channels:
  run.created:
    subscribe:
      operationId: onRunCreated
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.started:
    subscribe:
      operationId: onRunStarted
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.suspended:
    subscribe:
      operationId: onRunSuspended
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.resume_requested:
    subscribe:
      operationId: onRunResumeRequested
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.resumed:
    subscribe:
      operationId: onRunResumed
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.cancelled:
    subscribe:
      operationId: onRunCancelled
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.completed:
    subscribe:
      operationId: onRunCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.failed_business:
    subscribe:
      operationId: onRunFailedBusiness
      message:
        $ref: '#/components/messages/EventEnvelope'
  run.failed_system:
    subscribe:
      operationId: onRunFailedSystem
      message:
        $ref: '#/components/messages/EventEnvelope'
  step.started:
    subscribe:
      operationId: onStepStarted
      message:
        $ref: '#/components/messages/EventEnvelope'
  step.completed:
    subscribe:
      operationId: onStepCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'
  step.verify.failed:
    subscribe:
      operationId: onStepVerifyFailed
      message:
        $ref: '#/components/messages/EventEnvelope'
  llm.stream.started:
    subscribe:
      operationId: onLlmStreamStarted
      message:
        $ref: '#/components/messages/EventEnvelope'
  llm.stream.completed:
    subscribe:
      operationId: onLlmStreamCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'
  llm.stream.aborted:
    subscribe:
      operationId: onLlmStreamAborted
      message:
        $ref: '#/components/messages/EventEnvelope'
  challenge.detected:
    subscribe:
      operationId: onChallengeDetected
      message:
        $ref: '#/components/messages/EventEnvelope'
  challenge.resolved:
    subscribe:
      operationId: onChallengeResolved
      message:
        $ref: '#/components/messages/EventEnvelope'
  human_task.created:
    subscribe:
      operationId: onHumanTaskCreated
      message:
        $ref: '#/components/messages/EventEnvelope'
  human_task.resolved:
    subscribe:
      operationId: onHumanTaskResolved
      message:
        $ref: '#/components/messages/EventEnvelope'
  human_task.expired:
    subscribe:
      operationId: onHumanTaskExpired
      message:
        $ref: '#/components/messages/EventEnvelope'
  human_task.escalated:
    subscribe:
      operationId: onHumanTaskEscalated
      message:
        $ref: '#/components/messages/EventEnvelope'
  workitem.completed:
    subscribe:
      operationId: onWorkitemCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'
  workitem.dead_lettered:
    subscribe:
      operationId: onWorkitemDeadLettered
      message:
        $ref: '#/components/messages/EventEnvelope'
  pipeline.stage.completed:
    subscribe:
      operationId: onPipelineStageCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'
  sink.delivered:
    subscribe:
      operationId: onSinkDelivered
      message:
        $ref: '#/components/messages/EventEnvelope'
  sink.dead_lettered:
    subscribe:
      operationId: onSinkDeadLettered
      message:
        $ref: '#/components/messages/EventEnvelope'
  site.circuit_opened:
    subscribe:
      operationId: onSiteCircuitOpened
      message:
        $ref: '#/components/messages/EventEnvelope'
  site.circuit_closed:
    subscribe:
      operationId: onSiteCircuitClosed
      message:
        $ref: '#/components/messages/EventEnvelope'

components:
  messages:
    EventEnvelope:
      name: EventEnvelope
      title: Event Envelope v1
      contentType: application/json
      headers:
        type: object
        required:
          - correlation_id
          - idempotency_key
        properties:
          correlation_id:
            type: string
            format: uuid
          ordering_key:
            type: string
          idempotency_key:
            type: string
          causation_id:
            type: string
            format: uuid
      payload:
        $ref: '#/components/schemas/EventEnvelope'

  schemas:
    EventEnvelope:
      type: object
      title: Event Envelope v1
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_version
        - tenant_id
        - correlation_id
        - occurred_at
        - idempotency_key
        - payload_schema_ref
        - payload
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          $ref: '#/components/schemas/eventType'
        event_version:
          type: integer
          minimum: 1
        tenant_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        workitem_id:
          type: string
          format: uuid
        step_id:
          type: string
          minLength: 1
        attempt:
          type: integer
          minimum: 0
        correlation_id:
          type: string
          format: uuid
        causation_id:
          type: string
          format: uuid
        ordering_key:
          type: string
          minLength: 1
        occurred_at:
          type: string
          format: date-time
        idempotency_key:
          type: string
          minLength: 1
        payload_schema_ref:
          $ref: '#/components/schemas/EventPayloadSchemaRef'
        payload:
          type: object
          additionalProperties: false
          description: Closed empty object for all v1 event payload bodies.

    EventPayloadSchemaRef:
      type: string
      enum:
        - events/run.created@1
        - events/run.started@1
        - events/run.suspended@1
        - events/run.resume_requested@1
        - events/run.resumed@1
        - events/run.cancelled@1
        - events/run.completed@1
        - events/run.failed_business@1
        - events/run.failed_system@1
        - events/step.started@1
        - events/step.completed@1
        - events/step.verify.failed@1
        - events/llm.stream.started@1
        - events/llm.stream.completed@1
        - events/llm.stream.aborted@1
        - events/challenge.detected@1
        - events/challenge.resolved@1
        - events/human_task.created@1
        - events/human_task.resolved@1
        - events/human_task.expired@1
        - events/human_task.escalated@1
        - events/workitem.completed@1
        - events/workitem.dead_lettered@1
        - events/pipeline.stage.completed@1
        - events/sink.delivered@1
        - events/sink.dead_lettered@1
        - events/site.circuit_opened@1
        - events/site.circuit_closed@1

    eventType:
      type: string
      enum:
        - run.created
        - run.started
        - run.suspended
        - run.resume_requested
        - run.resumed
        - run.cancelled
        - run.completed
        - run.failed_business
        - run.failed_system
        - step.started
        - step.completed
        - step.verify.failed
        - llm.stream.started
        - llm.stream.completed
        - llm.stream.aborted
        - challenge.detected
        - challenge.resolved
        - human_task.created
        - human_task.resolved
        - human_task.expired
        - human_task.escalated
        - workitem.completed
        - workitem.dead_lettered
        - pipeline.stage.completed
        - sink.delivered
        - sink.dead_lettered
        - site.circuit_opened
        - site.circuit_closed
