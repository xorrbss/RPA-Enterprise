asyncapi: '2.6.0'

# =============================================================================
# D1 codegen 산출물 — run-events AsyncAPI
# 권위 계약: ../schema/event-envelope.schema.json
#   - envelope 구조(required/properties/additionalProperties:false) 1:1 반영
#   - event_type 레지스트리 = $defs.eventType.enum (총 31종, 아래 채널과 1:1)
# 어휘 정합: abort(API) → cancelled(state) → run.cancelled(event)  ⇒ run.aborted 없음
# "조용한 false/unknown 금지": 미정의 event_type 채널 없음, payload는 freeform 신뢰 금지
#   (소비자는 payload_schema_ref로 ajv 검증; 매핑은 D1 payload 레지스트리에서 고정)
# =============================================================================

info:
  title: RPA Enterprise Platform — Run Events
  version: '1.2.0'
  description: |
    엔터프라이즈 RPA 플랫폼 v1.2 내부 이벤트 버스(데이터/제어평면 outbox).

    전 내부 이벤트는 공통 봉투(Event Envelope v1, `../schema/event-envelope.schema.json`)를
    공유한다. 상태 변경과 동일 DB 트랜잭션에서 인큐(단일 Postgres 스택, outbox 내장)하며,
    `idempotency_key`로 중복 소비를 무시하고 `ordering_key`(기본 `run_id`)로 run 단위
    순서를 보장한다.

    채널 키는 envelope의 `event_type` 레지스트리(31종)와 1:1로 대응한다.
    각 채널의 메시지 본문은 동일한 `EventEnvelope`이며, `payload`의 실제 형태는
    `payload_schema_ref`(예: `events/run.completed@1`)가 가리키는 D1 payload 레지스트리
    스키마로 경계에서 ajv 검증되어야 한다(본 문서의 payload 참조는 자리표시자).

defaultContentType: application/json

# -----------------------------------------------------------------------------
# 채널 = event_type (event-envelope.schema.json $defs.eventType.enum 와 1:1, 31종)
# 각 채널은 동일 EventEnvelope 메시지를 subscribe(소비)한다.
# -----------------------------------------------------------------------------
channels:
  run.created:
    description: Run 생성(R1). 신규 run 레코드 등록.
    subscribe:
      operationId: onRunCreated
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.started:
    description: Run 실행 시작(R2). queued/created → running.
    subscribe:
      operationId: onRunStarted
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.suspended:
    description: Run 일시중단(@challenge/@human_task 등으로 suspended 진입).
    subscribe:
      operationId: onRunSuspended
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.resume_requested:
    description: Run 재개 요청(resume-token 제출). 재개 트리거 수신.
    subscribe:
      operationId: onRunResumeRequested
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.resumed:
    description: Run 재개 완료. suspended → running.
    subscribe:
      operationId: onRunResumed
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.cancelled:
    description: |
      Run 취소 완료. API `abort` 명령 → 상태 `aborting`→`cancelled`
      (state-machine R6/R10/R16/R23/R24/R26/R27/R28) → 이벤트 `run.cancelled`.
      어휘 정합: `run.aborted` 이벤트는 존재하지 않는다(UI 문구 "취소됨").
    subscribe:
      operationId: onRunCancelled
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.completed:
    description: Run 정상 완료. completing → completed.
    subscribe:
      operationId: onRunCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.failed_business:
    description: Run 비즈니스 실패(business 예외 분류). 재시도 비대상.
    subscribe:
      operationId: onRunFailedBusiness
      message:
        $ref: '#/components/messages/EventEnvelope'

  run.failed_system:
    description: Run 시스템 실패(system 예외 분류, 미분류 예외 흡수 포함).
    subscribe:
      operationId: onRunFailedSystem
      message:
        $ref: '#/components/messages/EventEnvelope'

  step.started:
    description: 스텝 실행 시작.
    subscribe:
      operationId: onStepStarted
      message:
        $ref: '#/components/messages/EventEnvelope'

  step.completed:
    description: 스텝 실행 완료(payload 보강 대상 — payload_schema_ref로 검증).
    subscribe:
      operationId: onStepCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'

  step.verify.failed:
    description: 스텝 Verify DSL 검증 실패(verify.schema.json criteria 불충족).
    subscribe:
      operationId: onStepVerifyFailed
      message:
        $ref: '#/components/messages/EventEnvelope'

  llm.stream.started:
    description: LLM Gateway SSE 스트림 시작(llm-gateway-adapter 표준 SSE 이벤트).
    subscribe:
      operationId: onLlmStreamStarted
      message:
        $ref: '#/components/messages/EventEnvelope'

  llm.stream.completed:
    description: LLM Gateway SSE 스트림 정상 종료.
    subscribe:
      operationId: onLlmStreamCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'

  llm.stream.aborted:
    description: LLM Gateway SSE 스트림 중단(abort).
    subscribe:
      operationId: onLlmStreamAborted
      message:
        $ref: '#/components/messages/EventEnvelope'

  challenge.detected:
    description: '@challenge 핸들러 — 챌린지 탐지. run suspended 유발.'
    subscribe:
      operationId: onChallengeDetected
      message:
        $ref: '#/components/messages/EventEnvelope'

  challenge.resolved:
    description: '@challenge 해소(challenge_resolution_attempts 멱등 기록).'
    subscribe:
      operationId: onChallengeResolved
      message:
        $ref: '#/components/messages/EventEnvelope'

  human_task.created:
    description: '@human_task 생성(HumanTask 상태머신 H1).'
    subscribe:
      operationId: onHumanTaskCreated
      message:
        $ref: '#/components/messages/EventEnvelope'

  human_task.resolved:
    description: HumanTask 처리 완료.
    subscribe:
      operationId: onHumanTaskResolved
      message:
        $ref: '#/components/messages/EventEnvelope'

  human_task.expired:
    description: HumanTask 만료(SLA 초과).
    subscribe:
      operationId: onHumanTaskExpired
      message:
        $ref: '#/components/messages/EventEnvelope'

  human_task.escalated:
    description: HumanTask 에스컬레이션.
    subscribe:
      operationId: onHumanTaskEscalated
      message:
        $ref: '#/components/messages/EventEnvelope'

  workitem.completed:
    description: Workitem 완료(Workitem 상태머신).
    subscribe:
      operationId: onWorkitemCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'

  workitem.dead_lettered:
    description: |
      Workitem dead-letter(처리 한계 초과). 통지 전용 — 소비자는 후속 자동 재처리를
      기대하지 말 것(error-catalog DEAD_LETTER 주석 참조).
    subscribe:
      operationId: onWorkitemDeadLettered
      message:
        $ref: '#/components/messages/EventEnvelope'

  pipeline.stage.completed:
    description: 파이프라인 스테이지 완료.
    subscribe:
      operationId: onPipelineStageCompleted
      message:
        $ref: '#/components/messages/EventEnvelope'

  sink.delivered:
    description: |
      외부 sink 전달 성공(sink_deliveries). 다운스트림 중복 방지는
      sink_idempotency_key(=tenant_id:sink_config_id:schema_ref:natural_key)로 보장.
    subscribe:
      operationId: onSinkDelivered
      message:
        $ref: '#/components/messages/EventEnvelope'

  sink.dead_lettered:
    description: 외부 sink 전달 dead-letter(통지 전용).
    subscribe:
      operationId: onSinkDeadLettered
      message:
        $ref: '#/components/messages/EventEnvelope'

  site.circuit_opened:
    description: |
      사이트 서킷 오픈(연속 실패 임계 초과). run-less 이벤트 — `ordering_key` 생략 가능.
    subscribe:
      operationId: onSiteCircuitOpened
      message:
        $ref: '#/components/messages/EventEnvelope'

  site.circuit_closed:
    description: 사이트 서킷 클로즈(복구). run-less 이벤트.
    subscribe:
      operationId: onSiteCircuitClosed
      message:
        $ref: '#/components/messages/EventEnvelope'

  worker.heartbeat:
    description: |
      워커 하트비트. 전형적 run-less 이벤트 — `run_id`/`ordering_key` 생략.
    subscribe:
      operationId: onWorkerHeartbeat
      message:
        $ref: '#/components/messages/EventEnvelope'

  worker.circuit_opened:
    description: 워커 서킷 오픈. run-less 이벤트.
    subscribe:
      operationId: onWorkerCircuitOpened
      message:
        $ref: '#/components/messages/EventEnvelope'

  worker.circuit_closed:
    description: |
      워커 서킷 클로즈(복구). README #9 — site/worker 서킷 대칭 보장 위해 추가됨.
      run-less 이벤트.
    subscribe:
      operationId: onWorkerCircuitClosed
      message:
        $ref: '#/components/messages/EventEnvelope'

# -----------------------------------------------------------------------------
components:
  messages:
    EventEnvelope:
      name: EventEnvelope
      title: Event Envelope v1
      summary: 전 내부 이벤트 공통 봉투(상태 변경과 동일 DB 트랜잭션 인큐, outbox 내장).
      contentType: application/json
      # ----------------------------------------------------------------------
      # 헤더 의미(라우팅/멱등/순서 제어 키).
      # 본 envelope은 평탄(flat) 구조라 이 키들은 message body에도 존재한다.
      # AsyncAPI headers 블록은 브로커/소비자 관점의 "제어 키 의미"를 명시하는 용도이며,
      # 값은 body의 동명 필드와 동일하다(트랜스포트 헤더로 승격되는 경우 동일 값 유지).
      # ----------------------------------------------------------------------
      headers:
        type: object
        required:
          - correlation_id
          - idempotency_key
        properties:
          correlation_id:
            type: string
            format: uuid
            description: |
              트레이스↔이벤트↔로그 상호 연결 키. event-envelope `correlation_id`,
              trace `correlation_id`(impl-bundle §E), API ApiError.correlation_id와
              **동일 값**. 라우팅/상관 추적에 사용.
          ordering_key:
            type: string
            description: |
              순서 보장 키. 기본값 = `run_id`(run 단위 순서 보장). run 없는 이벤트
              (worker.heartbeat, site.circuit_*, worker.circuit_* 등)는 생략 가능
              (그래서 required 아님). 소비자는 동일 ordering_key 메시지의 상대 순서를
              신뢰할 수 있다.
          idempotency_key:
            type: string
            description: |
              소비자 중복 무시 키(예: `run:step:attempt:verify`). 동일 키 재수신 시
              소비자는 효과를 1회만 적용해야 한다. 제어평면 인입 명령의 HTTP
              `Idempotency-Key`(명령 중복 제출 보호) 및 데이터평면
              `sink_idempotency_key`(외부 전달 중복 방지)와는 다른 계층의 키다.
          causation_id:
            type: string
            format: uuid
            description: 이 이벤트를 유발한 직전 이벤트 id(인과 추적). 선택.
      payload:
        $ref: '#/components/schemas/EventEnvelope'

  schemas:
    # ------------------------------------------------------------------------
    # event-envelope.schema.json(draft 2020-12) 와 1:1.
    # additionalProperties:false, required 7종 그대로 유지.
    # AsyncAPI 2.6 기본 schemaFormat은 JSON Schema draft-07 의미이나, 본 정의는
    # draft-07 호환 키워드(enum/format/minimum/$ref)만 사용한다.
    # ------------------------------------------------------------------------
    EventEnvelope:
      type: object
      title: Event Envelope v1
      description: |
        전 내부 이벤트 공통 봉투. 상태 변경과 동일 DB 트랜잭션에서 인큐
        (단일 Postgres 스택, outbox 내장). idempotency_key로 중복 소비 무시,
        ordering_key=run_id로 run 순서 보장.
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_version
        - tenant_id
        - correlation_id
        - occurred_at
        - idempotency_key
        - payload_schema_ref
        - payload
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          $ref: '#/components/schemas/eventType'
        event_version:
          type: integer
          minimum: 1
        tenant_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        workitem_id:
          type: string
          format: uuid
        step_id:
          type: string
        correlation_id:
          type: string
          format: uuid
        causation_id:
          type: string
          format: uuid
          description: 이 이벤트를 유발한 이벤트 id
        ordering_key:
          type: string
          description: |
            기본 run_id — run 단위 순서 보장. run 없는 이벤트
            (worker.heartbeat, site.circuit_* 등)는 생략 가능(그래서 required 아님).
        occurred_at:
          type: string
          format: date-time
        idempotency_key:
          type: string
          description: '예: run:step:attempt:verify — 소비자 중복 무시'
        payload_schema_ref:
          type: string
          description: |
            [FIX #7] 이 event_type의 payload를 검증할 등록 스키마 참조
            (예: 'events/run.completed@1'). 소비자는 payload를 freeform으로 신뢰하지
            말고 이 ref로 ajv 검증. event_type↔payload_schema_ref 매핑은 별도 payload
            레지스트리(D1 codegen 산출)에서 고정하며, 본 envelope은 매핑 강제
            메커니즘만 제공.
        payload:
          # D1 payload 레지스트리 자리표시: 실제 형태는 payload_schema_ref가 가리키는
          # 등록 스키마(events/{event_type}@{version})로 경계에서 ajv 검증.
          type: object
          description: |
            event_type별 본문. payload_schema_ref에 등록된 스키마로 검증되어야 함
            (경계에서 ajv). 본 문서에서는 자리표시(type:object)이며, D1 payload
            레지스트리가 event_type별 구체 스키마를 고정한다.

    # event-envelope.schema.json $defs.eventType.enum 와 1:1 (총 31종).
    eventType:
      type: string
      enum:
        - run.created
        - run.started
        - run.suspended
        - run.resume_requested
        - run.resumed
        - run.cancelled
        - run.completed
        - run.failed_business
        - run.failed_system
        - step.started
        - step.completed
        - step.verify.failed
        - llm.stream.started
        - llm.stream.completed
        - llm.stream.aborted
        - challenge.detected
        - challenge.resolved
        - human_task.created
        - human_task.resolved
        - human_task.expired
        - human_task.escalated
        - workitem.completed
        - workitem.dead_lettered
        - pipeline.stage.completed
        - sink.delivered
        - sink.dead_lettered
        - site.circuit_opened
        - site.circuit_closed
        - worker.heartbeat
        - worker.circuit_opened
        - worker.circuit_closed
