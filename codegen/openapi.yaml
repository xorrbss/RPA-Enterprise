          type: [string, "null"]

    # ===== Resource shapes (요지; 상세 필드 타입은 codegen/types 참조) =====
    Run:
      type: object
      description: 실행 리소스(요지). Read responses always include current_node and failure_reason; unknown node and absent failure are explicit nulls.
      required:
        - run_id
        - scenario_id
        - scenario_version_id
        - status
        - worker_id
        - attempts
        - as_of
        - current_node
        - failure_reason
        - updated_at
      properties:
        run_id: { type: string }
        scenario_id: { type: string }
        status: { $ref: '#/components/schemas/RunState' }
        scenario_version_id: { type: string }
        worker_id: { type: [string, "null"] }
        attempts: { type: integer }
        as_of:
          type: [string, "null"]
          format: date-time
          description: 서버가 생성 시 1회 고정(api-surface §0.6). 재시도/replay/resume에 재사용.
        workitem_id: { type: [string, "null"] }
        current_node:
          type: [string, "null"]
          description: Current executing IR node id when known; null when the runtime has no authoritative node.
        failure_reason:
          type: [object, "null"]
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
        updated_at:
          type: string
          format: date-time
          description: runs.updated_at. 콘솔이 오래 멈춘 실행을 추정하지 않고 실제 상태 갱신 시각으로 판단하는 데 사용.

    RunCommandResponse:
      type: object
      description: Minimal acknowledgement for run side-effect commands. Read shape is components.schemas.Run.
      additionalProperties: false
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { $ref: '#/components/schemas/RunState' }
        as_of:
          type: [string, "null"]
          format: date-time
          description: Present on createRun responses; omitted on abort responses.

    RunTrigger:
      type: object
      additionalProperties: false
      required:
        - trigger_id
        - scenario_version_id
        - trigger_type
        - status
        - cron_expression
        - timezone
        - webhook_secret_ref
        - webhook_secret_configured
        - params
        - catchup_policy
        - max_concurrent_runs
        - next_fire_at
        - created_by
        - created_at
        - updated_at
      properties:
        trigger_id: { type: string }
        scenario_version_id: { type: string }
        trigger_type:
          $ref: '#/components/schemas/RunTriggerType'
        status:
          $ref: '#/components/schemas/RunTriggerStatus'
        cron_expression:
          type: [string, "null"]
          minLength: 1
          description: Five-field cron expression for cron triggers; null for webhook triggers.
        timezone:
          type: [string, "null"]
          minLength: 1
          description: IANA timezone for cron triggers; null for webhook triggers.
        webhook_secret_ref:
          type: [string, "null"]
          pattern: '^secret://.+'
          description: SecretRef used for webhook HMAC verification when the caller can manage triggers; null for cron triggers and read-only callers.
        webhook_secret_configured:
          type: boolean
          description: True when a webhook trigger has an HMAC SecretRef configured, without exposing the raw SecretRef to read-only callers.
        params:
          type: object
          additionalProperties: true
        catchup_policy:
          type: string
          enum: [skip_missed, fire_once]
        max_concurrent_runs:
          type: integer
          minimum: 1
        next_fire_at:
          type: [string, "null"]
          format: date-time
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RunTriggerCreateRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [scenario_version_id, cron_expression, timezone]
          properties:
            trigger_type:
              type: string
              enum: [cron]
              default: cron
            scenario_version_id: { type: string }
            cron_expression:
              type: string
              minLength: 1
              description: Five-field cron expression. Supports numeric *, list, range, and step syntax.
            timezone: { type: string, minLength: 1 }
            params:
              type: object
              additionalProperties: true
              default: {}
            catchup_policy:
              type: string
              enum: [skip_missed, fire_once]
              default: skip_missed
            max_concurrent_runs:
              type: integer
              minimum: 1
              default: 1
            next_fire_at:
              type: [string, "null"]
              format: date-time
              description: Optional explicit first fire time. When omitted, the API calculates the next occurrence from cron_expression and timezone.
        - type: object
          additionalProperties: false
          required: [trigger_type, scenario_version_id, webhook_secret_ref]
          properties:
            trigger_type:
              type: string
              enum: [webhook]
            scenario_version_id: { type: string }
            webhook_secret_ref:
              type: string
              pattern: '^secret://.+'
            params:
              type: object
              additionalProperties: true
              default: {}
            catchup_policy:
              type: string
              enum: [skip_missed, fire_once]
              default: skip_missed
            max_concurrent_runs:
              type: integer
              minimum: 1
              default: 1

    RunTriggerUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        cron_expression:
          type: string
          minLength: 1
          description: Five-field cron expression. Supports numeric *, list, range, and step syntax.
        timezone: { type: string, minLength: 1 }
        webhook_secret_ref:
          type: string
          pattern: '^secret://.+'
        params:
          type: object
          additionalProperties: true
        catchup_policy:
          type: string
          enum: [skip_missed, fire_once]
        max_concurrent_runs:
          type: integer
          minimum: 1
        next_fire_at:
          type: [string, "null"]
          format: date-time
          description: Optional explicit next fire time. When cron_expression or timezone changes and this field is omitted, the API recalculates the next occurrence.

    RunTriggerCommandRequest:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }

    RunTriggerFire:
      type: object
      additionalProperties: false
      required:
        - fire_id
        - trigger_id
        - fire_key
        - status
        - scheduled_for
        - run_id
        - failure_reason
        - created_at
      properties:
        fire_id: { type: string }
        trigger_id: { type: string }
        fire_key:
          type: string
          description: tenant-local idempotency key for a trigger and scheduled instant.
        status:
          $ref: '#/components/schemas/RunTriggerFireStatus'
        scheduled_for:
          type: string
          format: date-time
        run_id:
          type: [string, "null"]
        failure_reason:
          type: [object, "null"]
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    RunTriggerWebhookReceipt:
      type: object
      additionalProperties: false
      required:
        - fire_id
        - trigger_id
        - fire_key
        - status
        - run_id
        - duplicate
        - failure_reason
        - received_at
      properties:
        fire_id: { type: string }
        trigger_id: { type: string }
        fire_key:
          type: string
          description: webhook:{event_id}; tenant-local idempotency key.
        status:
          $ref: '#/components/schemas/RunTriggerFireStatus'
        run_id:
          type: [string, "null"]
        duplicate:
          type: boolean
        failure_reason:
          type: [object, "null"]
          additionalProperties: true
        received_at:
          type: string
          format: date-time

    OpsAlert:
      type: object
      additionalProperties: false
      required:
        - alert_id
        - severity
        - source
        - title
        - detail
        - subject_type
        - subject_id
        - status
        - delivery
