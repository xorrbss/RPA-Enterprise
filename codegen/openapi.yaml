      additionalProperties: false

    AbortRequest:
      type: object
      properties:
        reason: { type: string }
      additionalProperties: false

    Scenario:
      type: object
      description: 시나리오 메타 + 최신 version(요지). version=ETag 대상(scenario_versions.version).
      properties:
        scenario_id: { type: string }
        version:
          type: integer
          description: 최신 version(ir.schema meta.version). ETag 값.
        latest_version_id: { type: string }
        ir:
          $ref: '#/components/schemas/IRDocument'

    PromoteScenarioFromRunRequest:
      type: object
      additionalProperties: false
      required: [run_id]
      properties:
        run_id:
          type: string
          format: uuid

    PromoteScenarioFromRunResponse:
      type: object
      additionalProperties: false
      required:
        - scenario_id
        - version
        - scenario_version_id
        - promotion_status
        - promoted_node_ids
        - skipped
      properties:
        scenario_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        scenario_version_id:
          type: string
          format: uuid
        promotion_status:
          type: string
          enum: [draft]
        promoted_node_ids:
          type: array
          items:
            type: string
        skipped:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [nodeId, reason]
            properties:
              nodeId:
                type: string
              reason:
                type: string

    ScenarioVersion:
      type: object
      description: scenario_versions row 요약. 상세 조회는 ir을 포함한다.
      properties:
        scenario_id: { type: string }
        version_id: { type: string }
        version:
          type: integer
          minimum: 1
        promotion_status:
          type: string
          enum: [draft, prod]
        created_at:
          type: string
          format: date-time
        promoted_at:
          type: [string, "null"]
          format: date-time
        ir:
          $ref: '#/components/schemas/IRDocument'

    ScenarioGenerationRequest:
      type: object
      required: [prompt]
      additionalProperties: false
      properties:
        prompt:
          type: string
          minLength: 1
          description: 자연어 업무 요청. 원장은 prompt_hash/ref만 저장하고 원문 저장은 금지.
        name:
          type: string
          description: 생성될 scenario 이름. 미지정 시 prompt hash 기반 이름.
        mode:
          type: string
          enum: [draft_only, save, save_and_run]
          default: save_and_run
        planner:
          type: string
          enum: [deterministic_mvp, llm_v1]
          default: deterministic_mvp
          description: llm_v1은 서버에 해당 ScenarioPlanner 구현체가 주입된 경우에만 허용된다.
        start_url:
          type: string
          format: uri
          description: 첫 navigate에 주입할 URL(params.start_url).
        target:
          allOf:
            - $ref: '#/components/schemas/ScenarioGenerationTarget'
          description: 생략 시 start_url/프롬프트 URL origin으로 site profile을 찾고 기본 browser identity/network policy 후보가 있으면 서버가 자동 추론한다.
        params:
          type: object
          additionalProperties: true
        model:
          type: [string, "null"]
        evidence:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'

    ScenarioGenerationRunRequest:
      type: object
      additionalProperties: false
      properties:
        target:
          allOf:
            - $ref: '#/components/schemas/ScenarioGenerationTarget'
          description: 기존 blocked generation에 보정 적용할 실행 target.
        start_url:
          type: string
          format: uri
          description: 보정 적용할 첫 navigate URL(params.start_url).
        params:
          type: object
          additionalProperties: true
        model:
          type: [string, "null"]
        evidence:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'

    ScenarioGenerationTarget:
      type: object
      required: [site_profile_id, browser_identity_id, network_policy_id]
      additionalProperties: false
      properties:
        site_profile_id: { type: string, format: uuid }
        browser_identity_id: { type: string, format: uuid }
        network_policy_id: { type: string, format: uuid }

    ScenarioGenerationEvidence:
      type: object
      additionalProperties: false
      properties:
        screenshot:
          type: string
          enum: [never, failure, each_step]
          default: failure
        video:
          type: string
          enum: [never, failure, always]
          default: never
          description: WebM/video capture request. Values other than never require the runtime video recorder capability; otherwise save_and_run returns video_recording_port_not_configured. The server normalizes planner output so requested evidence is reflected in IR meta.evidence and node policy.recording.

    ScenarioGenerationCapabilities:
      type: object
      additionalProperties: false
      required: [planner, visual_evidence]
      properties:
        planner:
          type: object
          additionalProperties: false
          required: [default_planner, available]
          properties:
            default_planner:
              type: string
              enum: [deterministic_mvp]
            available:
              type: array
              minItems: 1
              items:
                type: string
                enum: [deterministic_mvp, llm_v1]
        visual_evidence:
          type: object
          additionalProperties: false
          required: [screenshot, video]
          properties:
            screenshot:
              type: object
              additionalProperties: false
              required: [enabled, policies, default_policy]
              properties:
                enabled: { type: boolean }
                policies:
                  type: array
                  items:
                    type: string
                    enum: [never, failure, each_step]
                default_policy:
                  type: string
                  enum: [never, failure, each_step]
            video:
              type: object
              additionalProperties: false
              required: [enabled, policies, default_policy, artifact_type, media_type]
              properties:
                enabled: { type: boolean }
                policies:
                  type: array
                  items:
                    type: string
                    enum: [never, failure, always]
                default_policy:
                  type: string
                  enum: [never, failure, always]
                artifact_type:
                  type: string
                  enum: [video_masked]
                media_type:
                  type: string
                  enum: [video/webm]

    ScenarioGeneration:
      type: object
      description: 자연어 프롬프트 기반 generation 원장/응답. prompt 원문은 노출하지 않는다.
      additionalProperties: false
      required:
        - generation_id
        - mode
        - status
        - prompt_hash
        - planner
        - model
        - params_context
        - scenario_id
        - scenario_version_id
        - run_id
        - evidence_policy
        - blockers
        - created_by
        - created_at
        - draft_ir
        - validation_report
      properties:
        generation_id: { type: string }
        mode:
          type: string
          enum: [draft_only, save, save_and_run]
        status:
          type: string
          enum: [drafted, saved, run_queued, blocked, failed]
        prompt_hash: { type: string }
        prompt_redacted_ref:
          type: [string, "null"]
          description: Optional artifact/ref for redacted prompt material. Prompt plaintext is never returned.
        planner:
          type: string
          enum: [deterministic_mvp, llm_v1]
        model: { type: [string, "null"] }
        params_context:
          type: object
          additionalProperties: true
          description: Server-confirmed non-secret params context for later correction runs. Sensitive values are replaced with redacted markers.
        scenario_id: { type: [string, "null"] }
        scenario_version_id: { type: [string, "null"] }
        run_id: { type: [string, "null"] }
        evidence_policy:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'
        blockers:
          type: array
          items: { type: string }
        created_by:
          type: string
          description: Authenticated principal subject that created the generation ledger row.
        created_at:
          type: string
          format: date-time
        draft_ir:
          $ref: '#/components/schemas/IRDocument'
        validation_report:
          $ref: '#/components/schemas/ValidationReport'

    ScenarioGenerationList:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioGeneration'
        next_cursor:
          type: [string, "null"]

    IRDocument:
      type: object
      description: IR 문서. 상세 구조는 schema/ir.schema.json(권위). 본 문서는 body=IR 문서임만 고정.
      additionalProperties: true

    ValidateRequest:
      type: object
      description: 검증할 IR(저장 안 함) 또는 기존 version 참조. 둘 중 정확히 하나.
      oneOf:
        - required: [ir]
        - required: [version_id]
      properties:
        ir:
          $ref: '#/components/schemas/IRDocument'
        version_id:
          type: string
      additionalProperties: false

    ValidationReport:
      type: object
      description: ir-static-validation.md V1..V11 검증 보고서(요지). 상세 issue 구조는 codegen/types 참조.
      required: [errors, warnings]
      additionalProperties: false
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    ValidationIssue:
      type: object
      required: [rule, reason, code, detail]
      additionalProperties: false
      properties:
        rule:
          type: string
          enum: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10, V11]
        reason:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        nodeId:
          type: string
        detail:
          type: string

    PromoteRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: 승격 대상 환경(예 prod).
      additionalProperties: false

    ScenarioCommandRequest:
      type: object
      description: Empty object for side-effect scenario commands such as archive and rollback.
      additionalProperties: false

    HumanTask:
      type: object
      description: 휴먼 태스크 상세. artifact 본문은 별도 Artifacts API의 redaction/RBAC 경계를 탄다.
      properties:
        human_task_id: { type: string }
        state: { $ref: '#/components/schemas/HumanTaskState' }
        kind: { $ref: '#/components/schemas/HumanTaskKind' }
        assignee: { type: [string, "null"] }
        timeout: { type: [string, "null"] }
        on_timeout:
          type: string
          enum: [fail, escalate]
          description: reserved-handlers @human_task 입력(기본 fail). HumanTaskGuard.onTimeout과 정합.
        run_id: { type: [string, "null"] }
        payload:
          type: object
          additionalProperties: true
        result_schema:
          oneOf:
            - $ref: '#/components/schemas/HumanTaskBusinessFormSchema'
            - type: object
              additionalProperties: true
          description: >
            HumanTask V2 form hint. version=business_form_v1 is the configurable HITL/data-entry contract;
            legacy objects without version remain read-only hints.
        artifact_refs:
          type: array
          items: { type: string }
        result:
          oneOf:
            - $ref: '#/components/schemas/HumanTaskResolution'
            - type: "null"
        escalation_reason:
          type: [string, "null"]
          description: H5 수동 이관 사유(운영자 입력, optional). 재배정될 담당자 맥락 전달. 미이관/미입력이면 null.
        escalated_by:
          type: [string, "null"]
          description: H5 이관 주체(JWT sub). assignee/resolved_by와 동형.
        escalated_at:
          type: [string, "null"]
          description: H5 이관 시각(ISO-8601). 미이관이면 null.

    HumanTaskResolution:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, reject, correct, retry]
        corrections:
          type: object
          additionalProperties: true
          description: >
            For result_schema.version=business_form_v1 and decision=correct, keys must match declared fields
            and values must satisfy required/type/options validation.
        reason: { type: string }
        confidence:
          type: number
          minimum: 0
          maximum: 1
        notes: { type: string }
      additionalProperties: false

    HumanTaskBusinessFormSchema:
      type: object
      required: [version, fields]
      properties:
        version:
          type: string
          enum: [business_form_v1]
        title:
          type: string
        description:
          type: string
        fields:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/HumanTaskBusinessFormField'
      additionalProperties: false

    HumanTaskBusinessFormField:
      type: object
      required: [key, label, type]
      properties:
        key:
          type: string
          pattern: '^[A-Za-z_][A-Za-z0-9_]{0,63}$'
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, number, boolean, date, select]
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
        help_text:
          type: string
      additionalProperties: false

    HumanTaskResolveRequest:
      type: object
      description: V2 검증/교정 워크벤치 결과. 런타임 자동 소비는 별도 versioned IREL 변경 전까지 비활성.
      properties:
        result:
          $ref: '#/components/schemas/HumanTaskResolution'
      additionalProperties: false

    HumanTaskAssignRequest:
      type: object
      required: [assignee]
      properties:
        assignee: { type: string }
      additionalProperties: false

    HumanTaskEscalateRequest:
      type: object
      properties:
        reason: { type: string }
      additionalProperties: false

    Workitem:
      type: object
      description: 작업항목 상세(요지).
      properties:
        workitem_id: { type: string }
        status: { $ref: '#/components/schemas/WorkitemState' }
        attempts: { type: integer }
        unique_reference: { type: [string, "null"] }
        target_id:
          type: [string, "null"]
          description: v1 has no connector target authority table; responses return null and target_id filtering is rejected.
        checked_out_by: { type: [string, "null"] }
        checked_out_at: { type: [string, "null"], format: date-time }
        run_id: { type: [string, "null"] }

    DeadLetter:
      type: object
      description: >
        데드레터 항목(요지). status는 DEAD_LETTER 상태 통지(ApiError 아님 — api-surface §0.2).
      properties:
        dead_letter_id: { type: string }
        kind:
          type: string
          enum: [workitem, sink]
        status:
          type: string
          description: DEAD_LETTER 상태 통지(상태 필드로만 노출).
        source_id:
          type: string
          description: 원본 workitem_id 또는 sink delivery id.
        reason_code:
          type: string
          description: >
            실패 사유(error-catalog ErrorCode). workitem DLQ(dead_letter.reason_code) 한정.
            sink DLQ는 reason_code 컬럼이 없어 미제공(의도된 부재 — api-surface §4).
        created_at:
          type: string
          format: date-time
          description: 데드레터 발생 시각. workitem DLQ 한정(sink는 미제공).

    ReplayResult:
      type: object
      description: 재처리 결과(요지). workitem은 new 복원, sink는 재전달 트리거.
      properties:
        dead_letter_id: { type: string }
        accepted: { type: boolean }
        workitem_id: { type: [string, "null"] }

    Artifact:
      type: object
      description: >
        산출물 본문(요지). v1 redaction(RLS) → RBAC 게이트 통과 시에만 반환(D8-A1). 본문은 항상 마스킹(redacted object).
      properties:
        artifact_id: { type: string }
        type: { type: [string, "null"] }
        media_type:
          type: [string, "null"]
          description: image/png, video/webm, text/plain 등 미디어/다운로드 힌트.
        filename:
          type: [string, "null"]
          description: 사용자 표시/다운로드용 파일명. 내부 object path 아님.
        byte_size:
          type: [integer, "null"]
          minimum: 0
        duration_ms:
          type: [integer, "null"]
          minimum: 0
          description: video/run clip 등 시간 기반 artifact 길이.
        sha256: { type: [string, "null"] }
        redaction_status:
          type: string
          enum: [redacted, not_required]
          description: 200 응답은 가시(RLS 통과) 상태만 반환. pending/failed/quarantined/deleted는 RESOURCE_NOT_FOUND(404, D8-A1).
        retention_until: { type: [string, "null"], format: date-time }
        content:
          type: string
          description: 마스킹된 redacted object 본문(평문 노출 금지). object store(redacted at rest)에서 read.

    GenerationArtifactItem:
      type: object
      description: >
        자연어 generation 하위 artifact 목록 항목. metadata-only이며 content/object_ref/sha256은 노출하지 않는다.
        run/step 이전 generation artifact에서는 step_id/attempt가 null이다.
      properties:
        artifact_id: { type: string }
        step_id:
          type: [string, "null"]
          description: 생성 step id provenance. run-level 또는 generation-level artifact는 null.
        attempt:
          type: [integer, "null"]
          minimum: 0
          description: step attempt provenance. run-level 또는 generation-level artifact는 null.
        type: { type: string }
        media_type:
          type: [string, "null"]
          description: image/png, video/webm, text/plain 등 미디어/다운로드 힌트.
        filename:
          type: [string, "null"]
          description: 사용자 표시/다운로드용 파일명. 내부 object path 아님.
        byte_size:
          type: [integer, "null"]
          minimum: 0
        duration_ms:
          type: [integer, "null"]
          minimum: 0
        redaction_status:
          type: string
          enum: [redacted, not_required]
          description: 목록은 redacted/not_required·미삭제·비격리·동tenant 가시 artifact만 반환한다.
        retention_until: { type: [string, "null"], format: date-time }
        legal_hold: { type: boolean }
        created_at: { type: string, format: date-time }

    RunArtifactItem:
      allOf:
        - $ref: '#/components/schemas/GenerationArtifactItem'
      description: >
        run-scoped artifact list item. Metadata-only; content, object_ref, and sha256 are excluded.
        step_id/attempt are populated for step-scoped artifacts and null for run-level artifacts.

    RunStepStream:
      type: string
      description: >
        Server-sent event frame stream for run step changes. Frames carry only
        non-sensitive change signals; clients refetch RunStepList for detail.

    RunStep:
      type: object
      description: >
        run_steps 단계 트레이스 요약. 민감 입력/출력 본문, page_state, exception.message, evidence body는 노출하지 않는다.
      required:
        - step_id
        - node_id
        - action
        - status
        - attempt
        - cache_mode
        - artifact_ids
        - stagehand_calls
        - started_at
        - ended_at
        - duration_ms
        - exception
      properties:
        step_id: { type: string }
        node_id: { type: string }
        action: { type: string }
        status:
          type: string
          enum: [started, success, failed_business, failed_system, failed_challenge, failed_security, uncertain, skipped, suspended]
        attempt:
          type: integer
          minimum: 0
        cache_mode:
          type: string
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        duration_ms:
          type: [integer, "null"]
          minimum: 0
        artifact_ids:
          type: array
          items: { type: string }
          description: ArtifactRef[] only. Artifact bodies must be read through GET /v1/artifacts/{artifact_id}.
        stagehand_calls:
          type: array
          items: { $ref: '#/components/schemas/StagehandCallSummary' }
        exception:
          anyOf:
            - type: "null"
            - $ref: '#/components/schemas/StepExceptionSummary'

    StagehandCallSummary:
      type: object
      additionalProperties: false
      properties:
        model: { type: [string, "null"] }
        transport: { type: [string, "null"] }
        stream_status: { type: [string, "null"] }
        ttfb_ms: { type: [integer, "null"], minimum: 0 }
        input_tokens: { type: [integer, "null"], minimum: 0 }
        output_tokens: { type: [integer, "null"], minimum: 0 }
        cost: { type: [string, "null"] }

    StepExceptionSummary:
      type: object
      additionalProperties: false
      required: [class, code]
      properties:
        class:
          type: string
          enum: [business, system, security, challenge]
        code:
          type: string

    GenerationArtifact:
      allOf:
        - $ref: '#/components/schemas/Artifact'
        - type: object
          properties:
            generation_id:
              type: string
              description: scoped generation id. artifact가 이 generation에 속함을 확인한 뒤 반환한다.

    GatewayPolicy:
      type: object
      description: LLM 게이트웨이 정책(요지). capabilities는 llm-gateway-adapter.md ModelCapabilities.
      properties:
        model: { type: string }
        version:
          type: integer
          minimum: 1
          description: Mutation responses and list items include gateway_policies.version. Single policy GET exposes it as ETag only.
        is_default:
          type: boolean
        capabilities:
          type: object
          description: jsonMode/vision 등(llm-gateway-adapter.md ModelCapabilities).
          properties:
            jsonMode: { type: boolean }
            vision: { type: boolean }
          additionalProperties: true
        budget:
          type: object
          properties:
            maxInputTokens: { type: integer }
            maxOutputTokens: { type: integer }
            maxCost: { type: number }
          additionalProperties: true
        fallback:
          description: fallback 모델/폴백 설정(adapter §7).

    GatewayPolicyDeleteResponse:
      type: object
      additionalProperties: false
      required: [model, deleted]
      properties:
        model: { type: string }
        deleted: { type: boolean, const: true }

    Site:
      type: object
      description: site_profiles 요약/상세(요지). risk 등급값·컬럼은 Phase 2 DDL.
      properties:
        site_profile_id: { type: string }
        name: { type: string }
        url_pattern:
          type: string
          description: 런타임 site resolution과 실행 전 점검이 사용하는 http(s) origin/pattern 메타. 비밀 아님.
        risk: { $ref: '#/components/schemas/SiteRisk' }
        approval_status:
          type: string
          description: 승인 상태(요지). 상세 enum은 Phase 2.
        circuit_status:
          type: string
          description: circuit 상태(조회로만 노출; site.circuit_opened/closed 이벤트 연계).
        login_capable:
          type: boolean
          description: page_state_selectors.loginUrl 설정 여부. 세션 캡처 버튼 노출용 메타.
        session_ready:
          type: boolean
          description: 만료되지 않은 browser_sessions row 존재 여부. 쿠키 본문은 노출하지 않는다.
        session_expires_at:
          type: [string, "null"]
          format: date-time
        default_browser_identity_id:
          type: [string, "null"]
          description: 사이트 선택 시 자연어 실행 target에 자동 제안할 최신 browser_identity id.
        default_network_policy_id:
          type: [string, "null"]
          description: 자연어 실행 target에 자동 제안할 테넌트 기본 network_policy id.
        page_state_summary:
          $ref: '#/components/schemas/SitePageStateSummary'
        page_state_selectors:
          description: Non-secret SitePageStateConfig JSON used to derive auth and flags. Credentials/cookies are never stored here.
          oneOf:
            - $ref: '#/components/schemas/SitePageStateSelectors'
            - type: "null"

    SitePageStateSummary:
      type: object
      required: [configured, login_url_configured, authenticated_selector_configured, flag_count, flags]
      properties:
        configured: { type: boolean }
        login_url_configured: { type: boolean }
        authenticated_selector_configured: { type: boolean }
        flag_count: { type: integer, minimum: 0 }
        flags:
          type: array
          items: { type: string }
      additionalProperties: false

    SitePageStateSelectors:
      type: object
      required: [flags]
      properties:
        loginUrl:
          type: string
        authenticatedWhen:
          type: object
          required: [selector]
          properties:
            selector:
              type: string
              minLength: 1
          additionalProperties: false
        flags:
          type: object
          additionalProperties:
            type: object
            required: [kind, selector]
            properties:
              kind:
                type: string
                enum: [present, absent, min_count]
              selector:
                type: string
                minLength: 1
              n:
                type: integer
                minimum: 0
            additionalProperties: false
      additionalProperties: false

    SitePageStateUpdateRequest:
      type: object
      required: [page_state_selectors]
      properties:
        page_state_selectors:
          oneOf:
            - $ref: '#/components/schemas/SitePageStateSelectors'
            - type: "null"
      additionalProperties: false

    SitePageStateUpdateResponse:
      type: object
      required: [site_profile_id, page_state_selectors, page_state_summary]
      properties:
        site_profile_id:
          type: string
          format: uuid
        page_state_selectors:
          oneOf:
            - $ref: '#/components/schemas/SitePageStateSelectors'
            - type: "null"
        page_state_summary:
          $ref: '#/components/schemas/SitePageStateSummary'
      additionalProperties: false

