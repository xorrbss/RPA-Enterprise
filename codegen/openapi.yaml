openapi: 3.1.0
info:
  title: RPA Control-Plane API
  version: "1.0"
  description: >
    제어평면 REST API (v1). 운영 콘솔/외부 클라이언트가 호출하는 제어평면 엔드포인트의
    경로·메서드·요청/응답 요지·주요 에러코드를 고정한다. 본 문서는 api-surface.md(Control-Plane
    API Surface v1)를 1:1 변환한 D1 codegen 산출물이다.


    요지 수준 규약: components.schemas는 요지(shape) 수준이며, 상세 타입(IR/Verify/Event payload·필드
    required·examples)은 계약 ts/schema 및 codegen/types를 참조한다. 어휘 체인 abort → cancelled →
    run.cancelled, "조용한 false/unknown 금지", error-catalog 메타(httpStatus/exceptionClass)를 그대로 따른다.


    - 인증: 모든 엔드포인트 인증 필수. tenant_id는 요청 본문/쿼리가 아니라 인증 주체(토큰)에서 도출한다(api-surface §0.1).

    - 에러 본문: 모든 4xx/5xx는 ApiError(ts/error-catalog.ts). HTTP 상태코드는 ERROR_CATALOG[code].httpStatus를 그대로 사용한다(api-surface §0.2).

    - DEAD_LETTER(httpStatus 200)는 API 오류 응답이 아니다 — 상태 통지 전용 코드이므로 ApiError로 반환하지 않는다(api-surface §0.2/§4).
servers:
  - url: /v1
    description: Control-plane v1 base path.

tags:
  - name: Auth
    description: 인증·SSO/IdP 준비도와 JWT claim mapping 점검.
  - name: Runs
    description: 실행 제어 (api-surface §1)
  - name: RunTriggers
    description: 실행 예약·cron trigger orchestration (api-surface Run Triggers v1)
  - name: OpsAlerts
    description: 계산형 운영 알림·SLA 위험 센터 (api-surface Ops Alerts v1)
  - name: AutomationIdeas
    description: CoE automation intake, approval pipeline, and ROI estimation.
  - name: AuditLog
    description: Tenant-scoped immutable audit log explorer without raw payload disclosure.
  - name: ConnectorCatalog
    description: Browser RPA connector and template catalog metadata.
  - name: DocumentIDP
    description: Deterministic text/CSV/JSON document extraction and human validation queue.
  - name: Scenarios
    description: 시나리오 CRUD · 검증 · 승격 (api-surface §2)
  - name: ScenarioGenerations
    description: 자연어 프롬프트 기반 시나리오 생성 · 저장 · 선택 실행 (api-surface §2.5)
  - name: HumanTasks
    description: 휴먼 태스크 인박스 (api-surface §3)
  - name: Workitems
    description: 작업항목 · 데드레터 (api-surface §4)
  - name: Artifacts
    description: 산출물 조회 — redaction + RBAC 게이트 (api-surface §5)
  - name: GatewayPolicy
    description: LLM 게이트웨이 정책 (api-surface §6)
  - name: Sites
    description: 사이트 risk 승인 (api-surface §7)

# 전 엔드포인트 기본 인증(api-surface §0.1 / auth-rbac §3: tenant_id·roles는 JWT 클레임에서 도출).
# 공개 엔드포인트 없음. 개별 operation에서 override하지 않는 한 이 전역 보안이 적용된다.
security:
  - bearerAuth: []

paths:
  /auth/readiness:
    get:
      tags: [Auth]
      operationId: getAuthReadiness
      summary: Get SSO/IdP readiness
      description: >
        Returns non-secret auth provider readiness, required JWT claim mapping, and the current authenticated principal.
        HMAC secrets, raw tokens, and JWKS URL paths/queries are never returned.
      responses:
        '200':
          description: SSO/IdP readiness summary for the authenticated tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthReadiness'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 1. Runs (실행 제어) — api-surface §1
  # ============================================================
  /runs:
    post:
      tags: [Runs]
      operationId: createRun
      summary: 실행 생성
      description: >
        run 생성. 서버가 params.as_of를 1회 고정한다(요청 명시 시 그 값, 미지정 시 생성 시각;
        api-surface §0.6) → runs.as_of 영속화 → IREL date_* 결정론 보장. run.created 이벤트 emit.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
      responses:
        '201':
          description: 생성됨. run 리소스(status=queued). run.created 이벤트 emit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandResponse'
        '403':
          $ref: '#/components/responses/Error'        # SITE_PROFILE_BLOCKED
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'
    get:
      tags: [Runs]
      operationId: listRuns
      description: List tenant-scoped run records for operations monitoring and trace entry points.
      summary: 실행 목록
      parameters:
        - name: status
          in: query
          description: RunState 값으로 필터(state-machine-types.ts RunState).
          required: false
          schema:
            $ref: '#/components/schemas/RunState'
        - name: scenario_version_id
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Run).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPage'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs]
      operationId: getRun
      description: Return one run record with current state, worker metadata, and failure context.
      summary: 실행 상세
      responses:
        '200':
          description: run 상세(status ∈ RunState, worker_id, attempts, as_of, current_node, failure_reason).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'        # RUN_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/artifacts:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs, Artifacts]
      operationId: listRunArtifacts
      summary: run artifact list
      description: >
        Run-scoped image/video/result artifact list. The response is metadata-only and never exposes
        content, object_ref, sha256, or secret material. Step-scoped artifacts include nullable
        step_id/attempt provenance so review UIs can group screenshots and outputs by executor attempt.
        Body/blob reads must still pass the artifact redaction, RBAC, and audit gates.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: run-scoped artifact metadata list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunArtifactList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/steps:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs]
      operationId: listRunSteps
      summary: run step trace summary
      description: >
        Run-scoped execution step trace. The response is a non-sensitive summary only:
        output/input bodies, page state, evidence bodies, and exception messages are omitted.
        Evidence is exposed only as artifact_ids and must be read through artifact gates.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: run step summaries ordered by execution time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStepList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/steps/stream:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs]
      operationId: streamRunSteps
      summary: run step trace change stream
      description: >
        Server-sent event stream for RunTrace freshness. Events carry non-sensitive
        change signals only; clients refetch /runs/{run_id}/steps for the authoritative
        step summaries.
      responses:
        '200':
          description: SSE frames run_steps_changed and run_steps_closed.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/RunStepStream'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/abort:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Runs]
      operationId: abortRun
      summary: 실행 중단(취소) 요청
      description: >
        어휘 정합: 명령은 abort → 상태는 aborting→cancelled(R6/R10/R16/R23/R24/R26/R27/R28) →
        이벤트는 run.cancelled → UI 문구 "취소됨". 엔드포인트명은 abort 유지(api-surface §1).
        completing은 finalize 우선(R25) — abort 거부, RUN_ALREADY_TERMINAL(409). queued/claimed는
        dispatcher 큐/claim 회수로 처리하되 API는 동일하게 202 수락(결과 cancelled로 수렴).
        suspending은 bookmark-cancel port/durable abort intent가 없으면 bookmark 저장 중 side effect를
        추정하지 않고 멱등 예약 전에 WORKITEM_CHECKOUT_CONFLICT(run_bookmark_in_progress)로 fail-closed한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbortRequest'
      responses:
        '202':
          description: abort 수락(aborting 경유 cancelled). run.cancelled 이벤트.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandResponse'
        '404':
          $ref: '#/components/responses/Error'        # RUN_NOT_FOUND
        '409':
          $ref: '#/components/responses/Error'        # RUN_ALREADY_TERMINAL / RUN_ABORTED / WORKITEM_CHECKOUT_CONFLICT(suspending)
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 1.5 Run Triggers (예약 실행 / orchestration)
  # ============================================================
  /run-triggers:
    get:
      tags: [RunTriggers]
      operationId: listRunTriggers
      description: List tenant-scoped cron and signed webhook run triggers for operations and scheduling views.
      summary: 실행 예약 목록
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/RunTriggerStatus'
        - name: scenario_version_id
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: cron/webhook run trigger 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTriggerPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [RunTriggers]
      operationId: createRunTrigger
      summary: 실행 트리거 생성
      description: >
        Product Open v1 trigger는 cron 기반 예약 실행과 HMAC 서명 웹훅 발화만 성공 경로로 계약한다.
        파일 도착과 queue 적재 trigger는 V2 P1에서 저장하거나 성공처럼 응답하지 않는다.
        trigger_type=file_arrival|queue|queue_threshold 값은 IR_SCHEMA_INVALID(reason=invalid_trigger_type)로 거절한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTriggerCreateRequest'
      responses:
        '201':
          description: 생성된 run trigger.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTrigger'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /run-triggers/{trigger_id}:
    parameters:
      - $ref: '#/components/parameters/RunTriggerId'
    get:
      tags: [RunTriggers]
      operationId: getRunTrigger
      description: Return one tenant-scoped cron run trigger and its scheduling metadata.
      summary: 실행 예약 상세
      responses:
        '200':
          description: run trigger 상세.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTrigger'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [RunTriggers]
      operationId: updateRunTrigger
      description: Update mutable scheduling metadata for one cron run trigger.
      summary: 실행 예약 수정
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTriggerUpdateRequest'
      responses:
        '200':
          description: 수정된 run trigger.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTrigger'
        '404':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /run-triggers/{trigger_id}/pause:
    parameters:
      - $ref: '#/components/parameters/RunTriggerId'
    post:
      tags: [RunTriggers]
      operationId: pauseRunTrigger
      description: Pause one enabled cron run trigger without deleting its configuration.
      summary: 실행 예약 일시정지
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTriggerCommandRequest'
      responses:
        '200':
          description: paused 상태의 run trigger.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTrigger'
        default:
          $ref: '#/components/responses/Error'

  /run-triggers/{trigger_id}/resume:
    parameters:
      - $ref: '#/components/parameters/RunTriggerId'
    post:
      tags: [RunTriggers]
      operationId: resumeRunTrigger
      description: Resume one paused cron run trigger and continue future scheduling.
      summary: 실행 예약 재개
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTriggerCommandRequest'
      responses:
        '200':
          description: enabled 상태의 run trigger.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTrigger'
        default:
          $ref: '#/components/responses/Error'

  /run-triggers/{trigger_id}/fires:
    parameters:
      - $ref: '#/components/parameters/RunTriggerId'
    get:
      tags: [RunTriggers]
      operationId: listRunTriggerFires
      description: List the fire ledger for one run trigger, including recent outcomes.
      summary: 실행 예약 발화 이력
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: trigger fire ledger 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTriggerFirePage'
        default:
          $ref: '#/components/responses/Error'

  /webhooks/run-triggers/{tenant_id}/{trigger_id}:
    post:
      tags: [RunTriggers]
      operationId: receiveRunTriggerWebhook
      security: []
      summary: 서명 웹훅 트리거 발화 수신
      description: >
        Public JWT-skip webhook ingestion endpoint. The request is authenticated by
        X-RPA-Webhook-Signature over "{timestamp}.{event_id}.{canonical_json(body)}" using the
        SecretStore value referenced by the trigger's webhook_secret_ref. X-RPA-Webhook-Event-Id
        becomes fire_key "webhook:{event_id}" and is idempotent per tenant and trigger.
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string }
        - name: trigger_id
          in: path
          required: true
          schema: { type: string }
        - name: X-RPA-Webhook-Event-Id
          in: header
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: X-RPA-Webhook-Timestamp
          in: header
          required: true
          schema: { type: string }
          description: Unix timestamp in seconds or milliseconds; must be within five minutes of receipt.
        - name: X-RPA-Webhook-Signature
          in: header
          required: true
          schema: { type: string, pattern: '^sha256=[A-Fa-f0-9]{64}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Webhook fire accepted, replayed, skipped by concurrency, or recorded as failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTriggerWebhookReceipt'
        '401':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 1.6 Ops Alerts (SLA/운영 알림 센터)
  # ============================================================
  /ops-alerts:
    get:
      tags: [OpsAlerts]
      operationId: listOpsAlerts
      description: >
        List computed tenant-scoped operations alerts from current runs, human tasks, trigger fires, DLQ rows,
        and Bot Pool health. Product Open v1 delivery is console-only; acknowledgement state is persisted
        by alert generation, while Teams/Slack/email/webhook notifications remain unopened.
      summary: 운영 알림 목록
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OpsAlertSeverity'
        - name: source
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OpsAlertSource'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, acknowledged, all]
            default: open
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 계산형 운영 알림 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsAlertPage'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /ops-alerts/{alert_id}/ack:
    post:
      tags: [OpsAlerts]
      operationId: ackOpsAlert
      summary: 운영 알림 확인 처리
      description: >
        Acknowledge the current computed alert generation in the console alert center. The command requires
        Idempotency-Key and ops_alert.ack. The alert must still be current; stale or unknown alert IDs fail closed.
      parameters:
        - name: alert_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 300
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpsAlertAckRequest'
      responses:
        '200':
          description: Acknowledged current alert generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsAlert'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /ops/health:
    get:
      tags: [OpsAlerts]
      operationId: getOpsHealth
      description: >
        Return computed tenant-scoped operational health: queue depth when Graphile jobs view is
        available, browser lease occupancy/expiry, and stale nonterminal runs.
      summary: Operations health snapshot
      responses:
        '200':
          description: Current tenant operations health snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsHealth'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 2.5 Scenario Generations — api-surface §2.5
  # ============================================================
  # ============================================================
  # 1.6 Automation Ideas / CoE ROI
  # ============================================================
  /automation-ideas:
    get:
      tags: [AutomationIdeas]
      operationId: listAutomationIdeas
      description: List tenant-scoped automation candidates for CoE intake and prioritization.
      summary: List automation ideas
      parameters:
        - name: stage
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AutomationIdeaStage'
        - name: owner
          in: query
          required: false
          schema: { type: string }
        - name: department
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Tenant-scoped automation idea page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationIdeaPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [AutomationIdeas]
      operationId: createAutomationIdea
      summary: Create automation idea
      description: Intake an automation candidate for CoE assessment and ROI tracking.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationIdeaCreateRequest'
      responses:
        '201':
          description: Created automation idea.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationIdea'
        default:
          $ref: '#/components/responses/Error'

  /automation-ideas/{idea_id}:
    parameters:
      - $ref: '#/components/parameters/AutomationIdeaId'
    get:
      tags: [AutomationIdeas]
      operationId: getAutomationIdea
