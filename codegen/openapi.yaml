openapi: 3.1.0
info:
  title: RPA Control-Plane API
  version: "1.0"
  description: >
    제어평면 REST API (v1). 운영 콘솔/외부 클라이언트가 호출하는 제어평면 엔드포인트의
    경로·메서드·요청/응답 요지·주요 에러코드를 고정한다. 본 문서는 api-surface.md(Control-Plane
    API Surface v1)를 1:1 변환한 D1 codegen 산출물이다.


    요지 수준 규약: components.schemas는 요지(shape) 수준이며, 상세 타입(IR/Verify/Event payload·필드
    required·examples)은 계약 ts/schema 및 codegen/types를 참조한다. 어휘 체인 abort → cancelled →
    run.cancelled, "조용한 false/unknown 금지", error-catalog 메타(httpStatus/exceptionClass)를 그대로 따른다.


    - 인증: 모든 엔드포인트 인증 필수. tenant_id는 요청 본문/쿼리가 아니라 인증 주체(토큰)에서 도출한다(api-surface §0.1).

    - 에러 본문: 모든 4xx/5xx는 ApiError(ts/error-catalog.ts). HTTP 상태코드는 ERROR_CATALOG[code].httpStatus를 그대로 사용한다(api-surface §0.2).

    - DEAD_LETTER(httpStatus 200)는 API 오류 응답이 아니다 — 상태 통지 전용 코드이므로 ApiError로 반환하지 않는다(api-surface §0.2/§4).
servers:
  - url: /v1
    description: Control-plane v1 base path.

tags:
  - name: Runs
    description: 실행 제어 (api-surface §1)
  - name: Scenarios
    description: 시나리오 CRUD · 검증 · 승격 (api-surface §2)
  - name: ScenarioGenerations
    description: 자연어 프롬프트 기반 시나리오 생성 · 저장 · 선택 실행 (api-surface §2.5)
  - name: HumanTasks
    description: 휴먼 태스크 인박스 (api-surface §3)
  - name: Workitems
    description: 작업항목 · 데드레터 (api-surface §4)
  - name: Artifacts
    description: 산출물 조회 — redaction + RBAC 게이트 (api-surface §5)
  - name: GatewayPolicy
    description: LLM 게이트웨이 정책 (api-surface §6)
  - name: Sites
    description: 사이트 risk 승인 (api-surface §7)

# 전 엔드포인트 기본 인증(api-surface §0.1 / auth-rbac §3: tenant_id·roles는 JWT 클레임에서 도출).
# 공개 엔드포인트 없음. 개별 operation에서 override하지 않는 한 이 전역 보안이 적용된다.
security:
  - bearerAuth: []

paths:
  # ============================================================
  # 1. Runs (실행 제어) — api-surface §1
  # ============================================================
  /runs:
    post:
      tags: [Runs]
      operationId: createRun
      summary: 실행 생성
      description: >
        run 생성. 서버가 params.as_of를 1회 고정한다(요청 명시 시 그 값, 미지정 시 생성 시각;
        api-surface §0.6) → runs.as_of 영속화 → IREL date_* 결정론 보장. run.created 이벤트 emit.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
      responses:
        '201':
          description: 생성됨. run 리소스(status=queued). run.created 이벤트 emit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandResponse'
        '403':
          $ref: '#/components/responses/Error'        # SITE_PROFILE_BLOCKED
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'
    get:
      tags: [Runs]
      operationId: listRuns
      summary: 실행 목록
      parameters:
        - name: status
          in: query
          description: RunState 값으로 필터(state-machine-types.ts RunState).
          required: false
          schema:
            $ref: '#/components/schemas/RunState'
        - name: scenario_version_id
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Run).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPage'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs]
      operationId: getRun
      summary: 실행 상세
      responses:
        '200':
          description: run 상세(status ∈ RunState, worker_id, attempts, as_of, current_node, failure_reason).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'        # RUN_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/artifacts:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs, Artifacts]
      operationId: listRunArtifacts
      summary: run artifact list
      description: >
        Run-scoped image/video/result artifact list. The response is metadata-only and never exposes
        content, object_ref, sha256, or secret material. Step-scoped artifacts include nullable
        step_id/attempt provenance so review UIs can group screenshots and outputs by executor attempt.
        Body/blob reads must still pass the artifact redaction, RBAC, and audit gates.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: run-scoped artifact metadata list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunArtifactList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/steps:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Runs]
      operationId: listRunSteps
      summary: run step trace summary
      description: >
        Run-scoped execution step trace. The response is a non-sensitive summary only:
        output/input bodies, page state, evidence bodies, and exception messages are omitted.
        Evidence is exposed only as artifact_ids and must be read through artifact gates.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: run step summaries ordered by execution time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStepList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /runs/{run_id}/abort:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Runs]
      operationId: abortRun
      summary: 실행 중단(취소) 요청
      description: >
        어휘 정합: 명령은 abort → 상태는 aborting→cancelled(R6/R10/R16/R23/R24/R26/R27/R28) →
        이벤트는 run.cancelled → UI 문구 "취소됨". 엔드포인트명은 abort 유지(api-surface §1).
        completing은 finalize 우선(R25) — abort 거부, RUN_ALREADY_TERMINAL(409). queued/claimed는
        dispatcher 큐/claim 회수로 처리하되 API는 동일하게 202 수락(결과 cancelled로 수렴).
        suspending은 bookmark-cancel port/durable abort intent가 없으면 bookmark 저장 중 side effect를
        추정하지 않고 멱등 예약 전에 WORKITEM_CHECKOUT_CONFLICT(run_bookmark_in_progress)로 fail-closed한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbortRequest'
      responses:
        '202':
          description: abort 수락(aborting 경유 cancelled). run.cancelled 이벤트.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCommandResponse'
        '404':
          $ref: '#/components/responses/Error'        # RUN_NOT_FOUND
        '409':
          $ref: '#/components/responses/Error'        # RUN_ALREADY_TERMINAL / RUN_ABORTED / WORKITEM_CHECKOUT_CONFLICT(suspending)
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 2.5 Scenario Generations — api-surface §2.5
  # ============================================================
  /scenario-generations/capabilities:
    get:
      tags: [ScenarioGenerations]
      operationId: getScenarioGenerationCapabilities
      summary: 자연어 generation runtime capability 조회
      description: 콘솔 기본 evidence 선택을 위한 read-only runtime capability 힌트. 서버는 save_and_run마다 capability를 재검증한다.
      responses:
        '200':
          description: Runtime visual evidence capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGenerationCapabilities'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations:
    get:
      tags: [ScenarioGenerations]
      operationId: listScenarioGenerations
      summary: 자연어 generation 원장 목록
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [drafted, saved, run_queued, blocked, failed]
        - in: query
          name: run_id
          description: Linked run id reverse lookup for RunTrace recovery when generation hash is absent.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: tenant-scoped scenario generation 목록. prompt 원문은 노출하지 않는다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGenerationList'
        default:
          $ref: '#/components/responses/Error'

    post:
      tags: [ScenarioGenerations]
      operationId: generateScenario
      summary: 자연어 프롬프트로 시나리오 생성·저장·선택 실행
      description: >
        기본 planner는 deterministic_mvp. 선택적 planner=llm_v1은 서버에 LLM planner 구현체가
        주입된 경우에만 사용 가능하며, 미구성 시 RESOURCE_NOT_FOUND로 fail-closed한다.
        prompt+힌트를 IR로 변환한 뒤 기존 scenario save 검증 파이프라인(AJV → IREL → V1..V11)을 통과한 경우에만 저장한다. mode=save_and_run은
        run.create 권한과 target/start_url/target row 안전 조건이 모두 충족될 때만 run을 queued로 만든다.
        planner 산출 IR이 meta.evidence 또는 node policy.recording을 누락/약화해도 서버가 요청 evidence를 최종 권위로 정규화한 뒤 compile/save/run을 진행한다.
        명시 target의 site origin과 start_url origin이 다르면 target_start_url_site_mismatch blocker로
        차단한다. 조건 부족 시 scenario는 저장하되 status=blocked, blockers[]에 사유를 남긴다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioGenerationRequest'
      responses:
        '200':
          description: draft_only 생성 결과.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '201':
          description: scenario 저장 또는 run queued까지 처리된 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '403':
          $ref: '#/components/responses/Error'
        '412':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    get:
      tags: [ScenarioGenerations]
      operationId: getScenarioGeneration
      summary: 자연어 생성 원장 조회
      responses:
        '200':
          description: scenario generation 원장.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/run:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    post:
      tags: [ScenarioGenerations]
      operationId: runScenarioGeneration
      summary: blocked generation 보정 후 run 생성
      description: >
        blocked/saved scenario generation 원장에 target/start_url/evidence/params/model 보정값을 붙여
        같은 generation 원장에 run 생성을 재시도한다. 새 generation을 만들지 않으며 run.create 권한이 필요하다.
        보정 후에도 blockers가 남으면 run을 만들지 않고 status=blocked, run_id=null인 generation을 200으로 반환한다.
        실행 조건이 충족되면 run을 queued로 만들고 status=run_queued, run_id가 포함된 generation을 201로 반환한다.
        동일 Idempotency-Key 재시도는 같은 결과를 재생하며, hash mismatch 또는 이미 run이 연결된 원장은
        SCENARIO_VERSION_CONFLICT로 닫는다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioGenerationRunRequest'
      responses:
        '200':
          description: 아직 blockers가 남아 run을 만들지 않은 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '201':
          description: run queued까지 처리된 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '409':
          $ref: '#/components/responses/Error'        # WORKITEM_CHECKOUT_CONFLICT (idempotency in-flight)
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT (idempotency hash mismatch / already_run)
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/artifacts:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    get:
      tags: [ScenarioGenerations, Artifacts]
      operationId: listScenarioGenerationArtifacts
      summary: 자연어 생성 산출물 목록 조회
      description: >
        generation-scoped planner/output artifact 목록. metadata-only 응답이며 content/object_ref/sha256은 노출하지 않는다.
        generation artifact는 run/step 이전 산출물이므로 step_id/attempt provenance는 null이다. 본문 조회는 scoped artifact
        body route 또는 전역 artifact route의 redaction/RBAC/audit 게이트를 통과해야 한다.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: generation 하위 artifact metadata 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationArtifactList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/artifacts/{artifact_id}:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [ScenarioGenerations, Artifacts]
      operationId: getScenarioGenerationArtifact
      summary: 자연어 생성 산출물 본문 조회
      description: >
        artifact가 해당 generation에 속하는지 scoped 확인 후 전역 artifact body read와 같은 RLS redaction gate,
        artifact.read RBAC, append-only audit boundary를 통과한 경우에만 마스킹된 본문을 반환한다.
      responses:
        '200':
          description: scoped generation artifact 본문.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationArtifact'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 2. Scenarios — api-surface §2
  # ============================================================
  /scenarios:
    post:
      tags: [Scenarios]
      operationId: createScenario
      summary: 시나리오 생성
      description: >
        body는 IR 문서(schema/ir.schema.json). 저장 시 전 expression 파싱+타입체크(IREL) +
        IR 그래프 정적검증(V1..V11) 수행, 하나라도 실패 시 거부(api-surface §2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IRDocument'
      responses:
        '201':
          description: 생성됨. scenario(+초기 version).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'
    get:
      tags: [Scenarios]
      operationId: listScenarios
      summary: 시나리오 목록
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Scenario).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPage'
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    get:
      tags: [Scenarios]
      operationId: getScenario
      summary: 시나리오 상세
      description: 시나리오 메타 + 최신 version. 응답에 ETag(=scenario_versions.version) 포함.
      responses:
        '200':
          description: 시나리오 메타 + 최신 version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Scenarios]
      operationId: updateScenario
      summary: 시나리오 갱신
      description: >
        scenario mutation → If-Match 필수(낙관적 동시성, api-surface §0.3). ETag 불일치 시
        SCENARIO_VERSION_CONFLICT(412). body는 갱신 IR. 저장 시 IREL+V1..V11 재검증.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IRDocument'
      responses:
        '200':
          description: 새 version. ETag 갱신.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/validate:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: validateScenario
      summary: 시나리오 검증(dry-run)
      description: >
        부작용 없는 dry-run(저장하지 않음). body는 검증할 IR 또는 기존 version 참조.
        ValidationReport 반환(ir-static-validation.md V1..V11). 컴파일 에러는
        IR_EXPRESSION_COMPILE_ERROR(422), 그래프 검증 실패는 IR_SCHEMA_INVALID(422, details=reason).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: ValidationReport.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/promote:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: promoteScenario
      summary: 시나리오 승격
      description: >
        prod 승격 + AST 캐시 빌드. If-Match(version) + Idempotency-Key 필요. body.target(예: prod).
        승격 시 IREL+V1..V11 재검증.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteRequest'
      responses:
        '200':
          description: 승격된 version(AST 캐시 빌드).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/archive:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: archiveScenario
      summary: 시나리오 보관
      description: >
        active scenario를 archived 상태로 전환하고 prod promotion을 draft로 내린다. If-Match(version) +
        Idempotency-Key 필수. 동일 키 재시도는 최초 성공 응답을 재생한다.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioCommandRequest'
      responses:
        '200':
          description: 보관된 scenario version 요약.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    get:
      tags: [Scenarios]
      operationId: listScenarioVersions
      summary: 시나리오 버전 목록
      description: scenario_versions를 최신 version부터 페이지 형태로 반환한다.
      responses:
        '200':
          description: scenario version page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioVersionPage'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
      - $ref: '#/components/parameters/Version'
    get:
      tags: [Scenarios]
      operationId: getScenarioVersion
      summary: 시나리오 버전 상세
      description: 지정 version의 IR과 version metadata를 반환한다.
      responses:
        '200':
          description: scenario version detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioVersion'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions/{version}/rollback:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
      - $ref: '#/components/parameters/Version'
    post:
      tags: [Scenarios]
      operationId: rollbackScenario
      summary: 시나리오 버전 롤백
      description: >
        선택한 과거 version의 IR을 최신+1 draft로 복제한다. If-Match는 현재 최신 version과 비교하며,
        Idempotency-Key 재시도는 새 version을 중복 생성하지 않고 최초 응답을 재생한다.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioCommandRequest'
      responses:
        '200':
          description: 롤백으로 생성된 draft version 요약.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'


  # ============================================================
  # 3. Human Tasks — api-surface §3
  # ============================================================
  /human-tasks:
    get:
      tags: [HumanTasks]
      operationId: listHumanTasks
      summary: 휴먼 태스크 인박스 목록
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/HumanTaskState'
        - name: kind
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/HumanTaskKind'
        - name: assignee
          in: query
          required: false
          schema: { type: string }
        - name: run_id
          in: query
          required: false
          description: suspended run 상세에서 연결된 human task로 정확히 딥링크하기 위한 필터.
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=HumanTask).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTaskPage'
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    get:
      tags: [HumanTasks]
      operationId: getHumanTask
      summary: 휴먼 태스크 상세
      responses:
        '200':
          description: 태스크 상세(state, kind, assignee, timeout, on_timeout, run 연계). v1은 kind별 payload 본문을 노출하지 않는다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/resolve:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: resolveHumanTask
      summary: 휴먼 태스크 해소
      description: >
        v1 resolve는 optional result 객체를 수용하지만 전이/이벤트만 확정하고 result는 검증·영속·소비하지 않는다.
        HumanTask in_progress→resolved(H3), human_task.resolved 이벤트 → Run suspended→resume_requested(R13).
        만료/종결 태스크 → HUMAN_TASK_EXPIRED(410, business).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskResolveRequest'
      responses:
        '200':
          description: resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/start:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: startHumanTask
      summary: 휴먼 태스크 처리 시작
      description: >
        assigned→in_progress(H2). 배정된 담당자/역할 스코프 필요. 만료/종결 태스크 →
        HUMAN_TASK_EXPIRED(410), 권한 부족 → AUTHZ_FORBIDDEN(403).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: in_progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/assign:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: assignHumanTask
      summary: 휴먼 태스크 배정
      description: assigned(H1/H6). 권한 부족 → AUTHZ_FORBIDDEN(403). 만료/종결 태스크 → HUMAN_TASK_EXPIRED(410).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskAssignRequest'
      responses:
        '200':
          description: assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/escalate:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: escalateHumanTask
      summary: 휴먼 태스크 에스컬레이션
      description: >
        escalated(H5, 수동 진입만 담당). 성공 응답은 명시 routing/assignment owner가 reassignAssignee를
        소비할 때만 가능하다. 현재 Fastify 경로는 H5/R15 reassignAssignee를 admin queue/assignee_role로
        추정 매핑하지 않고, 미지원 pending side effect면 rollback 후 CONTROL_PLANE_INTERNAL_ERROR로
        fail-closed한다. timeout 기반 H4b/H8은 타이머 주도(API 비주도). 권한 부족 →
        AUTHZ_FORBIDDEN(403). 만료/종결 태스크 → HUMAN_TASK_EXPIRED(410).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskEscalateRequest'
      responses:
        '200':
          description: escalated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        '500':
          $ref: '#/components/responses/Error'        # CONTROL_PLANE_INTERNAL_ERROR unsupported reassignAssignee
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 4. Workitems / DLQ — api-surface §4
  # ============================================================
  /workitems:
    get:
      tags: [Workitems]
      operationId: listWorkitems
      summary: 작업항목 목록
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/WorkitemState'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Workitem).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkitemPage'
        default:
          $ref: '#/components/responses/Error'

  /workitems/{workitem_id}:
    parameters:
      - $ref: '#/components/parameters/WorkitemId'
    get:
      tags: [Workitems]
      operationId: getWorkitem
      summary: 작업항목 상세
      responses:
        '200':
          description: 상세(status ∈ WorkitemState, attempts, unique_reference, checked_out_by/at, 연계 run).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workitem'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /dlq:
    get:
      tags: [Workitems]
      operationId: listDeadLetters
      summary: 데드레터 목록
      description: >
        항목은 DEAD_LETTER 상태 통지(ApiError 아님 — api-surface §0.2/§4). kind=workitem|sink.
        sink DLQ는 데이터평면(sink_deliveries.status='dead_letter').
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [workitem, sink]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=DeadLetter; 상태값으로만 DEAD_LETTER 노출).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeadLetterPage'
        default:
          $ref: '#/components/responses/Error'

  /dlq/{dead_letter_id}/replay:
    parameters:
      - $ref: '#/components/parameters/DeadLetterId'
    post:
      tags: [Workitems]
      operationId: replayDeadLetter
      summary: 데드레터 재처리
      description: >
        운영자 재처리 권한 필요(operatorAuthorized guard, W10). workitem은 new로 복원(attempts 리셋,
        DLQ에서 복원). sink는 재전달 트리거(SINK_DELIVERY_FAILED 재시도 경로). 권한 부족 → AUTHZ_FORBIDDEN(403).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 재처리 수락(workitem new로 복원 / sink 재전달 트리거).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResult'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '409':
          $ref: '#/components/responses/Error'        # WORKITEM_CHECKOUT_CONFLICT
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 5. Artifacts — api-surface §5
  # ============================================================
  /artifacts/{artifact_id}:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifact
      summary: 산출물 조회
      description: >
        v1 게이트(release-decisions D8-A1): ① redaction은 RLS(artifacts_visible_isolation)로 강제 —
        redacted/not_required·미삭제·비격리만 가시. pending/failed/quarantined/deleted/cross-tenant·미존재는
        RESOURCE_NOT_FOUND(404, 존재 비노출)로 떨어지며 ARTIFACT_NOT_REDACTED(409)는 v1 미노출(BYPASSRLS 미사용).
        ② RBAC(artifact.read) — 권한 부족 → SECRET_ACCESS_DENIED(403). 본문은 항상 마스킹된 redacted object.
      responses:
        '200':
          description: artifact 본문. v1 redaction(RLS) → RBAC 게이트 통과 시에만(D8-A1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '403':
          $ref: '#/components/responses/Error'        # SECRET_ACCESS_DENIED
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND (v1 redaction-gate: pending/failed/quarantined/deleted/cross-tenant·미존재; D8-A1)
        default:
          $ref: '#/components/responses/Error'        # 예: §10 audit append 실패 시 fail-closed

  /artifacts/{artifact_id}/blob:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifactBlob
      summary: 산출물 원본 바이트 조회
      description: >
        JSON 본문 조회와 같은 artifact.read RBAC, RLS redaction gate, audit boundary를 통과한 뒤
        object store의 raw bytes를 반환한다. object_ref, sha256, content JSON은 노출하지 않는다.
      responses:
        '200':
          description: image/png, video/webm, text/plain 등 원본 artifact 바이트.
          headers:
            Content-Disposition:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            image/png:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 6. Gateway Policy — api-surface §6
  # ============================================================
  /gateway/policies:
    get:
      tags: [GatewayPolicy]
      operationId: listGatewayPolicies
      summary: LLM 게이트웨이 정책 목록
      description: 콘솔 CRUD 기준 목록. items에는 version과 is_default를 포함한다.
      responses:
        '200':
          description: 모델 정책 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicyList'
        default:
          $ref: '#/components/responses/Error'

  /gateway/policy:
    get:
      tags: [GatewayPolicy]
      operationId: getGatewayPolicy
      summary: LLM 게이트웨이 정책 조회
      description: capabilities는 llm-gateway-adapter.md ModelCapabilities.
      parameters:
        - name: model
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: 모델 정책(model, capabilities, budget, fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [GatewayPolicy]
      operationId: createGatewayPolicy
      summary: LLM 게이트웨이 정책 생성
      description: >
        신규 모델 정책을 생성한다. Idempotency-Key로 중복 제출을 보호하며,
        이미 존재하는 model은 IR_SCHEMA_INVALID(policy_model_in_use)로 거절한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayPolicy'
      responses:
        '201':
          description: 생성 정책.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / LLM_CAPABILITY_MISMATCH
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [GatewayPolicy]
      operationId: updateGatewayPolicy
      summary: LLM 게이트웨이 정책 갱신
      description: >
        정책이 capabilities와 모순되게 model/jsonMode 설정 시 LLM_CAPABILITY_MISMATCH(422).
        If-Match(정책 버전) + Idempotency-Key. ETag 대상은
        db/migration_core_entities.sql gateway_policies.version.
      parameters:
        - $ref: '#/components/parameters/IfMatchPolicy'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayPolicy'
      responses:
        '200':
          description: 갱신 정책.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '412':
          $ref: '#/components/responses/Error'        # POLICY_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # LLM_CAPABILITY_MISMATCH
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [GatewayPolicy]
      operationId: deleteGatewayPolicy
      summary: LLM 게이트웨이 정책 삭제
      description: >
        model 쿼리로 지정한 정책을 If-Match CAS와 Idempotency-Key 보호 아래 삭제한다.
      parameters:
        - name: model
          in: query
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IfMatchPolicy'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 삭제 결과.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicyDeleteResponse'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '412':
          $ref: '#/components/responses/Error'        # POLICY_VERSION_CONFLICT
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 7. Sites — api-surface §7
  # ============================================================
  /sites:
    get:
      tags: [Sites]
      operationId: listSites
      summary: 사이트 목록
      parameters:
        - name: risk
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SiteRisk'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Site; site_profiles 요약).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SitePage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Sites]
      operationId: createSite
      summary: 사이트 등록
      description: >
        site_profile 생성과 함께 기본 browser_identity 및 origin-host network_policy를 같은 tx에서 생성한다.
        응답의 default_* id는 자연어 시나리오 생성 target 자동 채움에 사용된다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteCreateRequest'
      responses:
        '201':
          description: 사이트 및 기본 실행 타깃 생성 완료.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteCreateResponse'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID
        default:
          $ref: '#/components/responses/Error'

  /sites/{site_profile_id}:
    parameters:
      - $ref: '#/components/parameters/SiteProfileId'
    get:
      tags: [Sites]
      operationId: getSite
      summary: 사이트 상세
      description: risk, 승인 상태, circuit 상태(조회로만 노출; 강제 재개는 비노출).
      responses:
        '200':
          description: 사이트 상세(risk, 승인 상태, circuit 상태).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Sites]
      operationId: updateSite
      summary: 사이트 이름 수정
      description: 사이트 표시 이름만 갱신한다. target 자동 채움용 기본 browser_identity/network_policy는 유지한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteUpdateRequest'
      responses:
        '200':
          description: 사이트 이름 수정 완료.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteUpdateResponse'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID
        default:
          $ref: '#/components/responses/Error'

  /sites/{site_profile_id}/approve:
    parameters:
      - $ref: '#/components/parameters/SiteProfileId'
    post:
      tags: [Sites]
      operationId: approveSite
      summary: 사이트 risk 승인
      description: >
        risk=red 사이트 실행 허용(SITE_PROFILE_BLOCKED 승인 워크플로우의 제어평면 진입점). 승인 권한 필요 —
        미보유 시 AUTHZ_FORBIDDEN(403). (SITE_PROFILE_BLOCKED는 런타임 실행 차단용으로 별개.)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteApproveRequest'
      responses:
        '200':
          description: 승인 반영(risk=red 사이트 실행 허용).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        default:
          $ref: '#/components/responses/Error'

# ============================================================
# Components
# ============================================================
components:
  # --- Security schemes (auth-rbac §3: JWT bearer, tenant_id+roles from claims) ---
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer. tenant_id 및 roles(Role[]) 클레임에서 도출(auth-rbac §3). 클라이언트 body/query의
        tenant_id는 불신. 인증 미성립(토큰 누락/서명 무효) 시 UNAUTHENTICATED(401), 인증됐으나 tenant
        누락/모호 또는 역할 권한 부족 시 AUTHZ_FORBIDDEN(403). 두 경우 모두 본문은 ApiError.
  # --- Reusable parameters ---
  parameters:
    RunId:
      name: run_id
      in: path
      required: true
      schema: { type: string }
    ScenarioId:
      name: scenario_id
      in: path
      required: true
      schema: { type: string }
    Version:
      name: version
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    GenerationId:
      name: generation_id
      in: path
      required: true
      schema: { type: string }
    HumanTaskId:
      name: human_task_id
      in: path
      required: true
      schema: { type: string }
    WorkitemId:
      name: workitem_id
      in: path
      required: true
      schema: { type: string }
    DeadLetterId:
      name: dead_letter_id
      in: path
      required: true
      schema: { type: string }
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema: { type: string }
    SiteProfileId:
      name: site_profile_id
      in: path
      required: true
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: 페이지 크기. 상한 기본값은 운영 정책(Phase 3) — 본 계약은 파라미터 형태만 고정(api-surface §0.5).
      schema:
        type: integer
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      description: 불투명 커서. 직전 응답 next_cursor 값을 그대로 전달(api-surface §0.5).
      schema:
        type: string
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: >
        낙관적 동시성(api-surface §0.3). 값 = scenario_versions.version(integer, ir.schema meta.version).
        불일치 → SCENARIO_VERSION_CONFLICT(412).
      schema:
        type: string
    IfMatchPolicy:
      name: If-Match
      in: header
      required: true
      description: >
        gateway_policies.version(integer). 정책 변경 요청 시 If-Match로 되돌린다(api-surface §6).
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        부작용 명령형 POST의 중복 제출 보호(api-surface §0.4). 서버는 (tenant_id, endpoint, key)로
        최초 결과를 보관, 동일 키 재제출 시 부작용 재실행 없이 최초 응답 반환. sink_idempotency_key(데이터평면)와는 다른 계층.
      schema:
        type: string

  # --- Reusable headers ---
  headers:
    ETag:
      description: scenario_versions.version(integer). 변경 요청 시 If-Match로 되돌린다(api-surface §0.3).
      schema:
        type: string

  # --- Reusable responses ---
  responses:
    Error:
      description: >
        오류 응답. 본문은 ApiError(ts/error-catalog.ts). HTTP 상태는 ERROR_CATALOG[code].httpStatus를
        그대로 사용한다. DEAD_LETTER는 오류 응답이 아니므로 본문 code로 반환되지 않는다(api-surface §0.2).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  # --- Schemas (요지 수준; 상세 타입은 계약 ts/schema 및 codegen/types 참조) ---
  schemas:
    # ===== Common error =====
    ApiError:
      type: object
      description: 공통 에러 응답(ts/error-catalog.ts ApiError).
      required: [code, message, correlation_id]
      additionalProperties: false
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          description: userMessage 또는 상세(민감정보 없음).
        details:
          description: 코드별 상세 페이로드(예 IR_SCHEMA_INVALID의 reason). 구조는 D1 위임(api-surface §9).
        correlation_id:
          type: string
          format: uuid
          description: event-envelope·trace correlation_id와 동일 값(api-surface §0.2).

    ErrorCode:
      type: string
      description: >
        ts/error-catalog.ts ErrorCode(47개). DEAD_LETTER는 enum에 포함되나 상태 통지 전용으로
        ApiError 응답 code로는 반환되지 않는다(api-surface §0.2).
      enum:
        - RUN_NOT_FOUND
        - RESOURCE_NOT_FOUND
        - RUN_ALREADY_TERMINAL
        - RUN_ABORTED
        - SCENARIO_VERSION_CONFLICT
        - POLICY_VERSION_CONFLICT
        - IR_SCHEMA_INVALID
        - IR_EXPRESSION_COMPILE_ERROR
        - IR_EXPRESSION_RUNTIME
        - IR_NO_BRANCH_MATCHED
        - SITE_PROFILE_BLOCKED
        - SITE_CIRCUIT_OPEN
        - SESSION_LOCKED
        - SESSION_GENERATION_CONFLICT
        - CHALLENGE_UNRESOLVED
        - RATE_BUDGET_EXCEEDED
        - BROWSER_LEASE_EXPIRED
        - BROWSER_CRASH
        - CDP_DISCONNECTED
        - LLM_BUDGET_EXCEEDED
        - LLM_CAPABILITY_MISMATCH
        - LLM_STREAM_TIMEOUT
        - LLM_STREAM_IDLE_TIMEOUT
        - LLM_MALFORMED_OUTPUT
        - LLM_CONTENT_FILTERED
        - LLM_RATE_LIMITED
        - LLM_BACKEND_UNAVAILABLE
        - LLM_CONNECTION_FAILED
        - EXTRACT_SCHEMA_INVALID
        - VERIFY_FAILED
        - EMPTY_RESULT_NO_WITNESS
        - SECRET_ACCESS_DENIED
        - DOMAIN_POLICY_VIOLATION
        - PROMPT_INJECTION_DETECTED
        - ARTIFACT_NOT_REDACTED
        - SHELL_COMMAND_NOT_ALLOWED
        - UNAUTHENTICATED
        - AUTHZ_FORBIDDEN
        - CONNECTOR_PERMISSION_DENIED
        - CONNECTOR_INCOMPATIBLE
        - CONNECTOR_HOOK_FAILED
        - SINK_DELIVERY_FAILED
        - RAW_PERSIST_FAILED
        - CONTROL_PLANE_INTERNAL_ERROR
        - HUMAN_TASK_EXPIRED
        - APPROVAL_ALREADY_DECIDED
        - WORKITEM_CHECKOUT_CONFLICT
        - DEAD_LETTER

    # ===== State enums (ts/state-machine-types.ts — 정확히 일치) =====
    RunState:
      type: string
      enum:
        - queued
        - claimed
        - running
        - suspending
        - suspended
        - resume_requested
        - resuming
        - completing
        - completed
        - aborting
        - cancelled
        - failed_business
        - failed_system
    WorkitemState:
      type: string
      enum:
        - new
        - processing
        - successful
        - retry
        - failed_business
        - failed_system
        - abandoned
    HumanTaskState:
      type: string
      enum:
        - open
        - assigned
        - in_progress
        - resolved
        - expired
        - cancelled
        - escalated
    HumanTaskKind:
      type: string
      enum:
        - approval
        - validation
        - exception
        - captcha
        - mfa
    SiteRisk:
      type: string
      description: site_profiles risk 등급. 값은 Phase 2 DDL 확정 전 api-surface §7 표기(red/amber/green) 기준.
      enum:
        - red
        - amber
        - green

    # ===== Pagination envelopes (api-surface §0.5: { items, next_cursor }) =====
    RunPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Run' }
        next_cursor:
          type: [string, "null"]
    StepPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/StepSummary' }
        next_cursor:
          type: [string, "null"]
    ScenarioPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Scenario' }
        next_cursor:
          type: [string, "null"]
    ScenarioVersionPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ScenarioVersion' }
        next_cursor:
          type: [string, "null"]
    HumanTaskPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HumanTask' }
        next_cursor:
          type: [string, "null"]
    WorkitemPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Workitem' }
        next_cursor:
          type: [string, "null"]
    DeadLetterPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DeadLetter' }
        next_cursor:
          type: [string, "null"]
    GatewayPolicyList:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GatewayPolicy' }
        next_cursor:
          type: [string, "null"]
    SitePage:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Site' }
        next_cursor:
          type: [string, "null"]
    GenerationArtifactList:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GenerationArtifactItem' }
        next_cursor:
          type: [string, "null"]
    RunArtifactList:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RunArtifactItem' }
        next_cursor:
          type: [string, "null"]
    RunStepList:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RunStep' }
        next_cursor:
          type: [string, "null"]

    # ===== Resource shapes (요지; 상세 필드 타입은 codegen/types 참조) =====
    Run:
      type: object
      description: 실행 리소스(요지). Read responses always include current_node and failure_reason; unknown node and absent failure are explicit nulls.
      required:
        - run_id
        - status
        - worker_id
        - attempts
        - as_of
        - current_node
        - failure_reason
        - updated_at
      properties:
        run_id: { type: string }
        status: { $ref: '#/components/schemas/RunState' }
        scenario_version_id: { type: string }
        worker_id: { type: [string, "null"] }
        attempts: { type: integer }
        as_of:
          type: [string, "null"]
          format: date-time
          description: 서버가 생성 시 1회 고정(api-surface §0.6). 재시도/replay/resume에 재사용.
        workitem_id: { type: [string, "null"] }
        current_node:
          type: [string, "null"]
          description: Current executing IR node id when known; null when the runtime has no authoritative node.
        failure_reason:
          type: [object, "null"]
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
        updated_at:
          type: string
          format: date-time
          description: runs.updated_at. 콘솔이 오래 멈춘 실행을 추정하지 않고 실제 상태 갱신 시각으로 판단하는 데 사용.

    RunCommandResponse:
      type: object
      description: Minimal acknowledgement for run side-effect commands. Read shape is components.schemas.Run.
      additionalProperties: false
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { $ref: '#/components/schemas/RunState' }
        as_of:
          type: [string, "null"]
          format: date-time
          description: Present on createRun responses; omitted on abort responses.
    StepSummary:
      type: object
      description: run_steps metadata-only step trace. Sensitive input/output bodies are not exposed.
      properties:
        step_id: { type: string }
        node_id: { type: string }
        attempt: { type: integer }
        action: { type: string }
        status: { type: string }
        cache_mode: { type: string }
        artifact_ids:
          type: array
          items: { type: string }
        stagehand_calls:
          type: array
          items: { $ref: '#/components/schemas/StagehandCallSummary' }
        started_at: { type: [string, "null"], format: date-time }
        ended_at: { type: [string, "null"], format: date-time }
        duration_ms: { type: [integer, "null"], minimum: 0 }
        exception:
          type: [object, "null"]
          properties:
            class: { type: string }
            code: { type: string }
          additionalProperties: false

    RunCreateRequest:
      type: object
      required: [scenario_version_id, params]
      properties:
        scenario_version_id: { type: string }
        params:
          type: object
          description: params_schema 준수(scenario의 params_schema). params.as_of 포함 가능.
        workitem_id:
          type: string
          description: optional. 작업항목 연계 시.
        model:
          type: string
          description: optional. gateway_policies.model override resolved and frozen on run create.
      additionalProperties: false

    AbortRequest:
      type: object
      properties:
        reason: { type: string }
      additionalProperties: false

    Scenario:
      type: object
      description: 시나리오 메타 + 최신 version(요지). version=ETag 대상(scenario_versions.version).
      properties:
        scenario_id: { type: string }
        version:
          type: integer
          description: 최신 version(ir.schema meta.version). ETag 값.
        latest_version_id: { type: string }
        ir:
          $ref: '#/components/schemas/IRDocument'

    ScenarioVersion:
      type: object
      description: scenario_versions row 요약. 상세 조회는 ir을 포함한다.
      properties:
        scenario_id: { type: string }
        version_id: { type: string }
        version:
          type: integer
          minimum: 1
        promotion_status:
          type: string
          enum: [draft, prod]
        created_at:
          type: string
          format: date-time
        promoted_at:
          type: [string, "null"]
          format: date-time
        ir:
          $ref: '#/components/schemas/IRDocument'

    ScenarioGenerationRequest:
      type: object
      required: [prompt]
      additionalProperties: false
      properties:
        prompt:
          type: string
          minLength: 1
          description: 자연어 업무 요청. 원장은 prompt_hash/ref만 저장하고 원문 저장은 금지.
        name:
          type: string
          description: 생성될 scenario 이름. 미지정 시 prompt hash 기반 이름.
        mode:
          type: string
          enum: [draft_only, save, save_and_run]
          default: save_and_run
        planner:
          type: string
          enum: [deterministic_mvp, llm_v1]
          default: deterministic_mvp
          description: llm_v1은 서버에 해당 ScenarioPlanner 구현체가 주입된 경우에만 허용된다.
        start_url:
          type: string
          format: uri
          description: 첫 navigate에 주입할 URL(params.start_url).
        target:
          allOf:
            - $ref: '#/components/schemas/ScenarioGenerationTarget'
          description: 생략 시 start_url/프롬프트 URL origin으로 site profile을 찾고 기본 browser identity/network policy 후보가 있으면 서버가 자동 추론한다.
        params:
          type: object
          additionalProperties: true
        model:
          type: [string, "null"]
        evidence:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'

    ScenarioGenerationRunRequest:
      type: object
      additionalProperties: false
      properties:
        target:
          allOf:
            - $ref: '#/components/schemas/ScenarioGenerationTarget'
          description: 기존 blocked generation에 보정 적용할 실행 target.
        start_url:
          type: string
          format: uri
          description: 보정 적용할 첫 navigate URL(params.start_url).
        params:
          type: object
          additionalProperties: true
        model:
          type: [string, "null"]
        evidence:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'

    ScenarioGenerationTarget:
      type: object
      required: [site_profile_id, browser_identity_id, network_policy_id]
      additionalProperties: false
      properties:
        site_profile_id: { type: string, format: uuid }
        browser_identity_id: { type: string, format: uuid }
        network_policy_id: { type: string, format: uuid }

    ScenarioGenerationEvidence:
      type: object
      additionalProperties: false
      properties:
        screenshot:
          type: string
          enum: [never, failure, each_step]
          default: failure
        video:
          type: string
          enum: [never, failure, always]
          default: never
          description: WebM/video capture request. Values other than never require the runtime video recorder capability; otherwise save_and_run returns video_recording_port_not_configured. The server normalizes planner output so requested evidence is reflected in IR meta.evidence and node policy.recording.

    ScenarioGenerationCapabilities:
      type: object
      additionalProperties: false
      required: [planner, visual_evidence]
      properties:
        planner:
          type: object
          additionalProperties: false
          required: [default_planner, available]
          properties:
            default_planner:
              type: string
              enum: [deterministic_mvp]
            available:
              type: array
              minItems: 1
              items:
                type: string
                enum: [deterministic_mvp, llm_v1]
        visual_evidence:
          type: object
          additionalProperties: false
          required: [screenshot, video]
          properties:
            screenshot:
              type: object
              additionalProperties: false
              required: [enabled, policies, default_policy]
              properties:
                enabled: { type: boolean }
                policies:
                  type: array
                  items:
                    type: string
                    enum: [never, failure, each_step]
                default_policy:
                  type: string
                  enum: [never, failure, each_step]
            video:
              type: object
              additionalProperties: false
              required: [enabled, policies, default_policy, artifact_type, media_type]
              properties:
                enabled: { type: boolean }
                policies:
                  type: array
                  items:
                    type: string
                    enum: [never, failure, always]
                default_policy:
                  type: string
                  enum: [never, failure, always]
                artifact_type:
                  type: string
                  enum: [video_masked]
                media_type:
                  type: string
                  enum: [video/webm]

    ScenarioGeneration:
      type: object
      description: 자연어 프롬프트 기반 generation 원장/응답. prompt 원문은 노출하지 않는다.
      additionalProperties: false
      required:
        - generation_id
        - mode
        - status
        - prompt_hash
        - planner
        - model
        - params_context
        - scenario_id
        - scenario_version_id
        - run_id
        - evidence_policy
        - blockers
        - created_by
        - created_at
        - draft_ir
        - validation_report
      properties:
        generation_id: { type: string }
        mode:
          type: string
          enum: [draft_only, save, save_and_run]
        status:
          type: string
          enum: [drafted, saved, run_queued, blocked, failed]
        prompt_hash: { type: string }
        prompt_redacted_ref:
          type: [string, "null"]
          description: Optional artifact/ref for redacted prompt material. Prompt plaintext is never returned.
        planner:
          type: string
          enum: [deterministic_mvp, llm_v1]
        model: { type: [string, "null"] }
        params_context:
          type: object
          additionalProperties: true
          description: Server-confirmed non-secret params context for later correction runs. Sensitive values are replaced with redacted markers.
        scenario_id: { type: [string, "null"] }
        scenario_version_id: { type: [string, "null"] }
        run_id: { type: [string, "null"] }
        evidence_policy:
          $ref: '#/components/schemas/ScenarioGenerationEvidence'
        blockers:
          type: array
          items: { type: string }
        created_by:
          type: string
          description: Authenticated principal subject that created the generation ledger row.
        created_at:
          type: string
          format: date-time
        draft_ir:
          $ref: '#/components/schemas/IRDocument'
        validation_report:
          $ref: '#/components/schemas/ValidationReport'

    ScenarioGenerationList:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioGeneration'
        next_cursor:
          type: [string, "null"]

    IRDocument:
      type: object
      description: IR 문서. 상세 구조는 schema/ir.schema.json(권위). 본 문서는 body=IR 문서임만 고정.
      additionalProperties: true

    ValidateRequest:
      type: object
      description: 검증할 IR(저장 안 함) 또는 기존 version 참조. 둘 중 정확히 하나.
      oneOf:
        - required: [ir]
        - required: [version_id]
      properties:
        ir:
          $ref: '#/components/schemas/IRDocument'
        version_id:
          type: string
      additionalProperties: false

    ValidationReport:
      type: object
      description: ir-static-validation.md V1..V11 검증 보고서(요지). 상세 issue 구조는 codegen/types 참조.
      required: [errors, warnings]
      additionalProperties: false
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    ValidationIssue:
      type: object
      required: [rule, reason, code, detail]
      additionalProperties: false
      properties:
        rule:
          type: string
          enum: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10, V11]
        reason:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        nodeId:
          type: string
        detail:
          type: string

    PromoteRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: 승격 대상 환경(예 prod).
      additionalProperties: false

    ScenarioCommandRequest:
      type: object
      description: Empty object for side-effect scenario commands such as archive and rollback.
      additionalProperties: false

    HumanTask:
      type: object
      description: 휴먼 태스크 상세(요지). v1은 inline payload 본문을 조합하거나 노출하지 않는다.
      properties:
        human_task_id: { type: string }
        state: { $ref: '#/components/schemas/HumanTaskState' }
        kind: { $ref: '#/components/schemas/HumanTaskKind' }
        assignee: { type: [string, "null"] }
        timeout: { type: [string, "null"] }
        on_timeout:
          type: string
          enum: [fail, escalate]
          description: reserved-handlers @human_task 입력(기본 fail). HumanTaskGuard.onTimeout과 정합.
        run_id: { type: [string, "null"] }

    HumanTaskResolveRequest:
      type: object
      description: v1 forward seam. optional result 객체는 수용하지만 전이/이벤트 외에는 검증·영속·소비하지 않는다.
      properties:
        result:
          type: object
          additionalProperties: true
      additionalProperties: false

    HumanTaskAssignRequest:
      type: object
      required: [assignee]
      properties:
        assignee: { type: string }
      additionalProperties: false

    HumanTaskEscalateRequest:
      type: object
      properties:
        reason: { type: string }
      additionalProperties: false

    Workitem:
      type: object
      description: 작업항목 상세(요지).
      properties:
        workitem_id: { type: string }
        status: { $ref: '#/components/schemas/WorkitemState' }
        attempts: { type: integer }
        unique_reference: { type: [string, "null"] }
        target_id:
          type: [string, "null"]
          description: v1 has no connector target authority table; responses return null and target_id filtering is rejected.
        checked_out_by: { type: [string, "null"] }
        checked_out_at: { type: [string, "null"], format: date-time }
        run_id: { type: [string, "null"] }

    DeadLetter:
      type: object
      description: >
        데드레터 항목(요지). status는 DEAD_LETTER 상태 통지(ApiError 아님 — api-surface §0.2).
      properties:
        dead_letter_id: { type: string }
        kind:
          type: string
          enum: [workitem, sink]
        status:
          type: string
          description: DEAD_LETTER 상태 통지(상태 필드로만 노출).
        source_id:
          type: string
          description: 원본 workitem_id 또는 sink delivery id.

    ReplayResult:
      type: object
      description: 재처리 결과(요지). workitem은 new 복원, sink는 재전달 트리거.
      properties:
        dead_letter_id: { type: string }
        accepted: { type: boolean }
        workitem_id: { type: [string, "null"] }

    Artifact:
      type: object
      description: >
        산출물 본문(요지). v1 redaction(RLS) → RBAC 게이트 통과 시에만 반환(D8-A1). 본문은 항상 마스킹(redacted object).
      properties:
        artifact_id: { type: string }
        type: { type: [string, "null"] }
        media_type:
          type: [string, "null"]
          description: image/png, video/webm, text/plain 등 미디어/다운로드 힌트.
        filename:
          type: [string, "null"]
          description: 사용자 표시/다운로드용 파일명. 내부 object path 아님.
        byte_size:
          type: [integer, "null"]
          minimum: 0
        duration_ms:
          type: [integer, "null"]
          minimum: 0
          description: video/run clip 등 시간 기반 artifact 길이.
        sha256: { type: [string, "null"] }
        redaction_status:
          type: string
          enum: [redacted, not_required]
          description: 200 응답은 가시(RLS 통과) 상태만 반환. pending/failed/quarantined/deleted는 RESOURCE_NOT_FOUND(404, D8-A1).
        retention_until: { type: [string, "null"], format: date-time }
        content:
          type: string
          description: 마스킹된 redacted object 본문(평문 노출 금지). object store(redacted at rest)에서 read.

    GenerationArtifactItem:
      type: object
      description: >
        자연어 generation 하위 artifact 목록 항목. metadata-only이며 content/object_ref/sha256은 노출하지 않는다.
        run/step 이전 generation artifact에서는 step_id/attempt가 null이다.
      properties:
        artifact_id: { type: string }
        step_id:
          type: [string, "null"]
          description: 생성 step id provenance. run-level 또는 generation-level artifact는 null.
        attempt:
          type: [integer, "null"]
          minimum: 0
          description: step attempt provenance. run-level 또는 generation-level artifact는 null.
        type: { type: string }
        media_type:
          type: [string, "null"]
          description: image/png, video/webm, text/plain 등 미디어/다운로드 힌트.
        filename:
          type: [string, "null"]
          description: 사용자 표시/다운로드용 파일명. 내부 object path 아님.
        byte_size:
          type: [integer, "null"]
          minimum: 0
        duration_ms:
          type: [integer, "null"]
          minimum: 0
        redaction_status:
          type: string
          enum: [redacted, not_required]
          description: 목록은 redacted/not_required·미삭제·비격리·동tenant 가시 artifact만 반환한다.
        retention_until: { type: [string, "null"], format: date-time }
        legal_hold: { type: boolean }
        created_at: { type: string, format: date-time }

    RunArtifactItem:
      allOf:
        - $ref: '#/components/schemas/GenerationArtifactItem'
      description: >
        run-scoped artifact list item. Metadata-only; content, object_ref, and sha256 are excluded.
        step_id/attempt are populated for step-scoped artifacts and null for run-level artifacts.

    RunStep:
      type: object
      description: >
        run_steps 단계 트레이스 요약. 민감 입력/출력 본문, page_state, exception.message, evidence body는 노출하지 않는다.
      required:
        - step_id
        - node_id
        - action
        - status
        - attempt
        - cache_mode
        - artifact_ids
        - stagehand_calls
        - started_at
        - ended_at
        - duration_ms
        - exception
      properties:
        step_id: { type: string }
        node_id: { type: string }
        action: { type: string }
        status:
          type: string
          enum: [started, success, failed_business, failed_system, failed_challenge, failed_security, uncertain, skipped, suspended]
        attempt:
          type: integer
          minimum: 0
        cache_mode:
          type: string
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        duration_ms:
          type: [integer, "null"]
          minimum: 0
        artifact_ids:
          type: array
          items: { type: string }
          description: ArtifactRef[] only. Artifact bodies must be read through GET /v1/artifacts/{artifact_id}.
        stagehand_calls:
          type: array
          items: { $ref: '#/components/schemas/StagehandCallSummary' }
        exception:
          anyOf:
            - type: "null"
            - $ref: '#/components/schemas/StepExceptionSummary'

    StagehandCallSummary:
      type: object
      additionalProperties: false
      properties:
        model: { type: [string, "null"] }
        transport: { type: [string, "null"] }
        stream_status: { type: [string, "null"] }
        ttfb_ms: { type: [integer, "null"], minimum: 0 }
        input_tokens: { type: [integer, "null"], minimum: 0 }
        output_tokens: { type: [integer, "null"], minimum: 0 }
        cost: { type: [string, "null"] }

    StepExceptionSummary:
      type: object
      additionalProperties: false
      required: [class, code]
      properties:
        class:
          type: string
          enum: [business, system, security, challenge]
        code:
          type: string

    GenerationArtifact:
      allOf:
        - $ref: '#/components/schemas/Artifact'
        - type: object
          properties:
            generation_id:
              type: string
              description: scoped generation id. artifact가 이 generation에 속함을 확인한 뒤 반환한다.

    GatewayPolicy:
      type: object
      description: LLM 게이트웨이 정책(요지). capabilities는 llm-gateway-adapter.md ModelCapabilities.
      properties:
        model: { type: string }
        version:
          type: integer
          minimum: 1
          description: Mutation responses and list items include gateway_policies.version. Single policy GET exposes it as ETag only.
        is_default:
          type: boolean
        capabilities:
          type: object
          description: jsonMode/vision 등(llm-gateway-adapter.md ModelCapabilities).
          properties:
            jsonMode: { type: boolean }
            vision: { type: boolean }
          additionalProperties: true
        budget:
          type: object
          properties:
            maxInputTokens: { type: integer }
            maxOutputTokens: { type: integer }
            maxCost: { type: number }
          additionalProperties: true
        fallback:
          description: fallback 모델/폴백 설정(adapter §7).

    GatewayPolicyDeleteResponse:
      type: object
      additionalProperties: false
      required: [model, deleted]
      properties:
        model: { type: string }
        deleted: { type: boolean, const: true }

    Site:
      type: object
      description: site_profiles 요약/상세(요지). risk 등급값·컬럼은 Phase 2 DDL.
      properties:
        site_profile_id: { type: string }
        name: { type: string }
        url_pattern:
          type: string
          description: 런타임 site resolution과 실행 전 점검이 사용하는 http(s) origin/pattern 메타. 비밀 아님.
        risk: { $ref: '#/components/schemas/SiteRisk' }
        approval_status:
          type: string
          description: 승인 상태(요지). 상세 enum은 Phase 2.
        circuit_status:
          type: string
          description: circuit 상태(조회로만 노출; site.circuit_opened/closed 이벤트 연계).
        login_capable:
          type: boolean
          description: page_state_selectors.loginUrl 설정 여부. 세션 캡처 버튼 노출용 메타.
        session_ready:
          type: boolean
          description: 만료되지 않은 browser_sessions row 존재 여부. 쿠키 본문은 노출하지 않는다.
        session_expires_at:
          type: [string, "null"]
          format: date-time
        default_browser_identity_id:
          type: [string, "null"]
          description: 사이트 선택 시 자연어 실행 target에 자동 제안할 최신 browser_identity id.
        default_network_policy_id:
          type: [string, "null"]
          description: 자연어 실행 target에 자동 제안할 테넌트 기본 network_policy id.

    SiteCreateRequest:
      type: object
      required: [name, url_pattern]
      properties:
        name:
          type: string
          minLength: 1
        url_pattern:
          type: string
          description: http(s) origin/pattern. Opaque schemes are rejected.
        risk:
          $ref: '#/components/schemas/SiteRisk'
        page_state_selectors:
          type: object
          description: SitePageStateConfig JSON. The server validates its closed flag registry.
          additionalProperties: true
      additionalProperties: false

    SiteCreateResponse:
      type: object
      required:
        - site_profile_id
        - name
        - url_pattern
        - risk
        - approved
        - default_browser_identity_id
        - default_network_policy_id
      properties:
        site_profile_id:
          type: string
          format: uuid
        name:
          type: string
        url_pattern:
          type: string
        risk:
          $ref: '#/components/schemas/SiteRisk'
        approved:
          type: boolean
        default_browser_identity_id:
          type: string
          format: uuid
          description: Default browser_identity created with the site for natural-language run targets.
        default_network_policy_id:
          type: string
          format: uuid
          description: Default origin-host network_policy created with the site for natural-language run targets.
      additionalProperties: false

    SiteUpdateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
      additionalProperties: false

    SiteUpdateResponse:
      type: object
      required: [site_profile_id, name]
      properties:
        site_profile_id:
          type: string
          format: uuid
        name:
          type: string
      additionalProperties: false

    SiteApproveRequest:
      type: object
      properties:
        reason: { type: string }
        expires_at:
          type: string
          format: date-time
      additionalProperties: false
