          $ref: '#/components/responses/Error'

  /document-jobs:
    get:
      tags: [DocumentIDP]
      operationId: listDocumentJobs
      summary: List document automation jobs
      description: List tenant-scoped document extraction jobs. Source document bytes are never returned by this endpoint.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/DocumentJobStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Document job page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentJobPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [DocumentIDP]
      operationId: createDocumentJob
      summary: Create a document extraction job
      description: Create a deterministic text/CSV/JSON document extraction job from a redacted source artifact.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentJobCreateRequest'
      responses:
        '201':
          description: Created document job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentJob'
        default:
          $ref: '#/components/responses/Error'

  /document-jobs/{job_id}:
    get:
      tags: [DocumentIDP]
      operationId: getDocumentJob
      summary: Get a document extraction job
      description: Return a tenant-scoped document job without source artifact bytes.
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Document job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentJob'
        default:
          $ref: '#/components/responses/Error'

  /document-jobs/{job_id}/extract:
    post:
      tags: [DocumentIDP]
      operationId: extractDocumentJob
      summary: Run deterministic document extraction
      description: Read the redacted source artifact through the artifact audit boundary and store extraction fields.
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentJobCommandRequest'
      responses:
        '200':
          description: Document extraction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentExtraction'
        default:
          $ref: '#/components/responses/Error'

  /document-jobs/{job_id}/extraction:
    get:
      tags: [DocumentIDP]
      operationId: getDocumentExtraction
      summary: Get stored document extraction result
      description: Return stored extraction fields and validation state for a document job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Document extraction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentExtraction'
        default:
          $ref: '#/components/responses/Error'

  /document-jobs/{job_id}/validation-task:
    post:
      tags: [DocumentIDP]
      operationId: createDocumentValidationTask
      summary: Create a human validation task for missing or low-confidence fields
      description: Create or return the reviewer task that captures corrected document field values.
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentJobCommandRequest'
      responses:
        '201':
          description: Human task reference for validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentValidationTask'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/capabilities:
    get:
      tags: [ScenarioGenerations]
      operationId: getScenarioGenerationCapabilities
      summary: 자연어 generation runtime capability 조회
      description: 콘솔 기본 evidence 선택을 위한 read-only runtime capability 힌트. 서버는 save_and_run마다 capability를 재검증한다.
      responses:
        '200':
          description: Runtime visual evidence capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGenerationCapabilities'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations:
    get:
      tags: [ScenarioGenerations]
      operationId: listScenarioGenerations
      description: List saved scenario generation attempts without exposing raw prompt bodies.
      summary: 자연어 generation 원장 목록
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [drafted, saved, run_queued, blocked, failed]
        - in: query
          name: run_id
          description: Linked run id reverse lookup for RunTrace recovery when generation hash is absent.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: tenant-scoped scenario generation 목록. prompt 원문은 노출하지 않는다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGenerationList'
        default:
          $ref: '#/components/responses/Error'

    post:
      tags: [ScenarioGenerations]
      operationId: generateScenario
      summary: 자연어 프롬프트로 시나리오 생성·저장·선택 실행
      description: >
        기본 planner는 deterministic_mvp. 선택적 planner=llm_v1은 서버에 LLM planner 구현체가
        주입된 경우에만 사용 가능하며, 미구성 시 RESOURCE_NOT_FOUND로 fail-closed한다.
        prompt+힌트를 IR로 변환한 뒤 기존 scenario save 검증 파이프라인(AJV → IREL → V1..V11)을 통과한 경우에만 저장한다. mode=save_and_run은
        run.create 권한과 target/start_url/target row 안전 조건이 모두 충족될 때만 run을 queued로 만든다.
        planner 산출 IR이 meta.evidence 또는 node policy.recording을 누락/약화해도 서버가 요청 evidence를 최종 권위로 정규화한 뒤 compile/save/run을 진행한다.
        명시 target의 site origin과 start_url origin이 다르면 target_start_url_site_mismatch blocker로
        차단한다. 조건 부족 시 scenario는 저장하되 status=blocked, blockers[]에 사유를 남긴다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioGenerationRequest'
      responses:
        '200':
          description: draft_only 생성 결과.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '201':
          description: scenario 저장 또는 run queued까지 처리된 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '403':
          $ref: '#/components/responses/Error'
        '412':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    get:
      tags: [ScenarioGenerations]
      operationId: getScenarioGeneration
      description: Return one scenario generation record, blockers, and linked run metadata.
      summary: 자연어 생성 원장 조회
      responses:
        '200':
          description: scenario generation 원장.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/run:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    post:
      tags: [ScenarioGenerations]
      operationId: runScenarioGeneration
      summary: blocked generation 보정 후 run 생성
      description: >
        blocked/saved scenario generation 원장에 target/start_url/evidence/params/model 보정값을 붙여
        같은 generation 원장에 run 생성을 재시도한다. 새 generation을 만들지 않으며 run.create 권한이 필요하다.
        보정 후에도 blockers가 남으면 run을 만들지 않고 status=blocked, run_id=null인 generation을 200으로 반환한다.
        실행 조건이 충족되면 run을 queued로 만들고 status=run_queued, run_id가 포함된 generation을 201로 반환한다.
        동일 Idempotency-Key 재시도는 같은 결과를 재생하며, hash mismatch 또는 이미 run이 연결된 원장은
        SCENARIO_VERSION_CONFLICT로 닫는다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioGenerationRunRequest'
      responses:
        '200':
          description: 아직 blockers가 남아 run을 만들지 않은 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '201':
          description: run queued까지 처리된 generation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioGeneration'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '409':
          $ref: '#/components/responses/Error'        # WORKITEM_CHECKOUT_CONFLICT (idempotency in-flight)
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT (idempotency hash mismatch / already_run)
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/artifacts:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
    get:
      tags: [ScenarioGenerations, Artifacts]
      operationId: listScenarioGenerationArtifacts
      summary: 자연어 생성 산출물 목록 조회
      description: >
        generation-scoped planner/output artifact 목록. metadata-only 응답이며 content/object_ref/sha256은 노출하지 않는다.
        generation artifact는 run/step 이전 산출물이므로 step_id/attempt provenance는 null이다. 본문 조회는 scoped artifact
        body route 또는 전역 artifact route의 redaction/RBAC/audit 게이트를 통과해야 한다.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: generation 하위 artifact metadata 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationArtifactList'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /scenario-generations/{generation_id}/artifacts/{artifact_id}:
    parameters:
      - $ref: '#/components/parameters/GenerationId'
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [ScenarioGenerations, Artifacts]
      operationId: getScenarioGenerationArtifact
      summary: 자연어 생성 산출물 본문 조회
      description: >
        artifact가 해당 generation에 속하는지 scoped 확인 후 전역 artifact body read와 같은 RLS redaction gate,
        artifact.read RBAC, append-only audit boundary를 통과한 경우에만 마스킹된 본문을 반환한다.
      responses:
        '200':
          description: scoped generation artifact 본문.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationArtifact'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 2. Scenarios — api-surface §2
  # ============================================================
  /scenarios:
    post:
      tags: [Scenarios]
      operationId: createScenario
      summary: 시나리오 생성
      description: >
        body는 IR 문서(schema/ir.schema.json). 저장 시 전 expression 파싱+타입체크(IREL) +
        IR 그래프 정적검증(V1..V11) 수행, 하나라도 실패 시 거부(api-surface §2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IRDocument'
      responses:
        '201':
          description: 생성됨. scenario(+초기 version).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'
    get:
      tags: [Scenarios]
      operationId: listScenarios
      description: List tenant-scoped scenario definitions and their current versions.
      summary: 시나리오 목록
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Scenario).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioPage'
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    get:
      tags: [Scenarios]
      operationId: getScenario
      summary: 시나리오 상세
      description: 시나리오 메타 + 최신 version. 응답에 ETag(=scenario_versions.version) 포함.
      responses:
        '200':
          description: 시나리오 메타 + 최신 version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Scenarios]
      operationId: updateScenario
      summary: 시나리오 갱신
      description: >
        scenario mutation → If-Match 필수(낙관적 동시성, api-surface §0.3). ETag 불일치 시
        SCENARIO_VERSION_CONFLICT(412). body는 갱신 IR. 저장 시 IREL+V1..V11 재검증.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IRDocument'
      responses:
        '200':
          description: 새 version. ETag 갱신.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/validate:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: validateScenario
      summary: 시나리오 검증(dry-run)
      description: >
        부작용 없는 dry-run(저장하지 않음). body는 검증할 IR 또는 기존 version 참조.
        ValidationReport 반환(ir-static-validation.md V1..V11). 컴파일 에러는
        IR_EXPRESSION_COMPILE_ERROR(422), 그래프 검증 실패는 IR_SCHEMA_INVALID(422, details=reason).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: ValidationReport.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/promote:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: promoteScenario
      summary: 시나리오 승격
      description: >
        prod 승격 + AST 캐시 빌드. If-Match(version) + Idempotency-Key 필요. body.target(예: prod).
        승격 시 IREL+V1..V11 재검증.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteRequest'
      responses:
        '200':
          description: 승격된 version(AST 캐시 빌드).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/promote-from-run:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: promoteScenarioFromRun
      summary: 성공 실행을 결정형 봇 draft로 굳히기
      description: >
        성공 run의 결정형 ActionPlan(click/fill/select 및 cache-hit)을 새 draft scenario version의
        IR act args로 베이킹한다(PbD). run은 같은 scenario에 속해야 하며 completed 상태여야 한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteScenarioFromRunRequest'
      responses:
        '201':
          description: 성공 run에서 결정형 act args를 베이킹한 새 draft version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteScenarioFromRunResponse'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/archive:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    post:
      tags: [Scenarios]
      operationId: archiveScenario
      summary: 시나리오 보관
      description: >
        active scenario를 archived 상태로 전환하고 prod promotion을 draft로 내린다. If-Match(version) +
        Idempotency-Key 필수. 동일 키 재시도는 최초 성공 응답을 재생한다.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioCommandRequest'
      responses:
        '200':
          description: 보관된 scenario version 요약.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
    get:
      tags: [Scenarios]
      operationId: listScenarioVersions
      summary: 시나리오 버전 목록
      description: scenario_versions를 최신 version부터 페이지 형태로 반환한다.
      responses:
        '200':
          description: scenario version page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioVersionPage'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
      - $ref: '#/components/parameters/Version'
    get:
      tags: [Scenarios]
      operationId: getScenarioVersion
      summary: 시나리오 버전 상세
      description: 지정 version의 IR과 version metadata를 반환한다.
      responses:
        '200':
          description: scenario version detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioVersion'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /scenarios/{scenario_id}/versions/{version}/rollback:
    parameters:
      - $ref: '#/components/parameters/ScenarioId'
      - $ref: '#/components/parameters/Version'
    post:
      tags: [Scenarios]
      operationId: rollbackScenario
      summary: 시나리오 버전 롤백
      description: >
        선택한 과거 version의 IR을 최신+1 draft로 복제한다. If-Match는 현재 최신 version과 비교하며,
        Idempotency-Key 재시도는 새 version을 중복 생성하지 않고 최초 응답을 재생한다.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioCommandRequest'
      responses:
        '200':
          description: 롤백으로 생성된 draft version 요약.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scenario'
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '412':
          $ref: '#/components/responses/Error'        # SCENARIO_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / IR_EXPRESSION_COMPILE_ERROR
        default:
          $ref: '#/components/responses/Error'


  # ============================================================
  # 3. Human Tasks — api-surface §3
  # ============================================================
  /human-tasks:
    get:
      tags: [HumanTasks]
      operationId: listHumanTasks
      description: List human-in-the-loop tasks for queue triage and suspended run recovery.
      summary: 휴먼 태스크 인박스 목록
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/HumanTaskState'
        - name: kind
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/HumanTaskKind'
        - name: assignee
          in: query
          required: false
          schema: { type: string }
        - name: run_id
          in: query
          required: false
          description: suspended run 상세에서 연결된 human task로 정확히 딥링크하기 위한 필터.
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=HumanTask).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTaskPage'
        default:
          $ref: '#/components/responses/Error'

  /principals:
    get:
      tags: [HumanTasks]
      operationId: listPrincipals
      summary: 테넌트 담당자 디렉터리(name-picker 소스)
      description: >
        테넌트 주체 디렉터리(principals 테이블). 각 항목은 principal_id(surrogate uuid)·sub(PrincipalId=JWT sub)·
        display_name·email·source(jwt|manual). 표시명은 JWT optional name 클레임 자동 upsert(source=jwt) 또는
        admin 수동 등록(source=manual)으로 채운다. human_tasks.assignee→principals FK는 없어 디렉터리 미등록 sub도
        직접 배정 가능(자유 입력 폴백 유지). RBAC는 principal.read(viewer+; 실 배정은 human_task.assign이 강제).
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Principal; 공유 (created_at, id) keyset).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [HumanTasks]
      operationId: createPrincipal
      summary: 담당자 디렉터리 수동 등록(admin)
      description: >
        admin이 미로그인 담당자를 사전 등록한다(source=manual). UNIQUE(tenant_id, sub) 위반(이미 등록) → 422.
        RBAC는 principal.manage(admin).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrincipalCreateRequest'
      responses:
        '201':
          description: 등록된 디렉터리 항목.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID(중복 sub)
        default:
          $ref: '#/components/responses/Error'

  /principals/{principal_id}:
    parameters:
      - $ref: '#/components/parameters/PrincipalId'
    patch:
      tags: [HumanTasks]
      operationId: updatePrincipal
      summary: 담당자 디렉터리 수정(admin)
      description: 표시이름/이메일 부분 갱신(email=null=제거, 최소 1개). sub는 자연키라 불변. RBAC는 principal.manage.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrincipalUpdateRequest'
      responses:
        '200':
          description: 수정된 디렉터리 항목.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [HumanTasks]
      operationId: deletePrincipal
      summary: 담당자 디렉터리 삭제(admin)
      description: 디렉터리 항목 제거. human_tasks.assignee는 FK 없는 자유형 text라 기존 배정에 영향 없음. RBAC는 principal.manage.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 삭제 완료.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalDeleteResponse'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    get:
      tags: [HumanTasks]
      operationId: getHumanTask
      description: Return one human task with assignment, timeout, and related run metadata.
      summary: 휴먼 태스크 상세
      responses:
        '200':
          description: 태스크 상세(state, kind, assignee, timeout, on_timeout, run 연계). v1은 kind별 payload 본문을 노출하지 않는다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/resolve:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: resolveHumanTask
      summary: 휴먼 태스크 해소
      description: >
        V2 resolve는 optional result 객체를 검증·영속해 검증/교정 워크벤치 결과로 조회 가능하게 한다.
        런타임 재개 컨텍스트 자동 주입은 별도 IREL/reserved-handler 변경 전까지 비활성이다.
        HumanTask in_progress→resolved(H3), human_task.resolved 이벤트 → Run suspended→resume_requested(R13).
        만료/종결 태스크 → HUMAN_TASK_EXPIRED(410, business).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskResolveRequest'
      responses:
        '200':
          description: resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/start:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: startHumanTask
      summary: 휴먼 태스크 처리 시작
      description: >
        assigned→in_progress(H2). 배정된 담당자/역할 스코프 필요. 만료/종결 태스크 →
        HUMAN_TASK_EXPIRED(410), 권한 부족 → AUTHZ_FORBIDDEN(403).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: in_progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/assign:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: assignHumanTask
      summary: 휴먼 태스크 배정
      description: assigned(H1/H6). 권한 부족 → AUTHZ_FORBIDDEN(403). 만료/종결 태스크 → HUMAN_TASK_EXPIRED(410).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskAssignRequest'
      responses:
        '200':
          description: assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        default:
          $ref: '#/components/responses/Error'

  /human-tasks/{human_task_id}/escalate:
    parameters:
      - $ref: '#/components/parameters/HumanTaskId'
    post:
      tags: [HumanTasks]
      operationId: escalateHumanTask
      summary: 휴먼 태스크 에스컬레이션
      description: >
        escalated(H5, 수동 진입만 담당). 담당자 해제 모델: reassignAssignee를 명시 소비로
        처리한다 — assignee를 NULL로 비워 escalated 큐를 개방하고(이후 H6 assign으로 재배정),
        optional reason을 escalation_reason(+escalated_by/escalated_at)으로 같은 트랜잭션에
        영속한다(추정 admin queue 매핑 아님 — state-machine.md §3 routing). Run R15는 suspended
        유지. timeout 기반 H4b/H8은 타이머 주도(API 비주도). 권한 부족 → AUTHZ_FORBIDDEN(403).
        만료/종결 태스크 → HUMAN_TASK_EXPIRED(410).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HumanTaskEscalateRequest'
      responses:
        '200':
          description: escalated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanTask'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '410':
          $ref: '#/components/responses/Error'        # HUMAN_TASK_EXPIRED
        '500':
          $ref: '#/components/responses/Error'        # CONTROL_PLANE_INTERNAL_ERROR (run coupling 등 미지원 pending side effect fail-closed)
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 4. Workitems / DLQ — api-surface §4
  # ============================================================
  /workitems:
    get:
      tags: [Workitems]
      operationId: listWorkitems
      description: List queue workitems by state for throughput, retry, and exception handling.
      summary: 작업항목 목록
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/WorkitemState'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=Workitem).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkitemPage'
        default:
          $ref: '#/components/responses/Error'

  /workitems/{workitem_id}:
    parameters:
      - $ref: '#/components/parameters/WorkitemId'
    get:
      tags: [Workitems]
      operationId: getWorkitem
      description: Return one queue workitem with state, attempt, checkout, and linked run fields.
      summary: 작업항목 상세
      responses:
        '200':
          description: 상세(status ∈ WorkitemState, attempts, unique_reference, checked_out_by/at, 연계 run).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workitem'
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        default:
          $ref: '#/components/responses/Error'

  /dlq:
    get:
      tags: [Workitems]
      operationId: listDeadLetters
      summary: 데드레터 목록
      description: >
        항목은 DEAD_LETTER 상태 통지(ApiError 아님 — api-surface §0.2/§4). kind=workitem|sink.
        sink DLQ는 데이터평면(sink_deliveries.status='dead_letter').
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [workitem, sink]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 커서 페이지(items=DeadLetter; 상태값으로만 DEAD_LETTER 노출).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeadLetterPage'
        default:
          $ref: '#/components/responses/Error'

  /dlq/{dead_letter_id}/replay:
    parameters:
      - $ref: '#/components/parameters/DeadLetterId'
    post:
      tags: [Workitems]
      operationId: replayDeadLetter
      summary: 데드레터 재처리
      description: >
        운영자 재처리 권한 필요(operatorAuthorized guard, W10). workitem은 new로 복원(attempts 리셋,
        DLQ에서 복원). sink는 재전달 트리거(SINK_DELIVERY_FAILED 재시도 경로). 권한 부족 → AUTHZ_FORBIDDEN(403).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 재처리 수락(workitem new로 복원 / sink 재전달 트리거).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResult'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '409':
          $ref: '#/components/responses/Error'        # WORKITEM_CHECKOUT_CONFLICT
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 5. Artifacts — api-surface §5
  # ============================================================
  /artifacts/{artifact_id}:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifact
      summary: 산출물 조회
      description: >
        v1 게이트(release-decisions D8-A1): ① redaction은 RLS(artifacts_visible_isolation)로 강제 —
        redacted/not_required·미삭제·비격리만 가시. pending/failed/quarantined/deleted/cross-tenant·미존재는
        RESOURCE_NOT_FOUND(404, 존재 비노출)로 떨어지며 ARTIFACT_NOT_REDACTED(409)는 v1 미노출(BYPASSRLS 미사용).
        ② RBAC(artifact.read) — 권한 부족 → SECRET_ACCESS_DENIED(403). 본문은 항상 마스킹된 redacted object.
      responses:
        '200':
          description: artifact 본문. v1 redaction(RLS) → RBAC 게이트 통과 시에만(D8-A1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '403':
          $ref: '#/components/responses/Error'        # SECRET_ACCESS_DENIED
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND (v1 redaction-gate: pending/failed/quarantined/deleted/cross-tenant·미존재; D8-A1)
        default:
          $ref: '#/components/responses/Error'        # 예: §10 audit append 실패 시 fail-closed

  /artifacts/{artifact_id}/blob:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifactBlob
      summary: 산출물 원본 바이트 조회
      description: >
        JSON 본문 조회와 같은 artifact.read RBAC, RLS redaction gate, audit boundary를 통과한 뒤
        object store의 raw bytes를 반환한다. object_ref, sha256, content JSON은 노출하지 않는다.
      responses:
        '200':
          description: image/png, video/webm, text/plain 등 원본 artifact 바이트.
          headers:
            Content-Disposition:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            image/png:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  # ============================================================
  # 6. Gateway Policy — api-surface §6
  # ============================================================
  /gateway/policies:
    get:
      tags: [GatewayPolicy]
      operationId: listGatewayPolicies
      summary: LLM 게이트웨이 정책 목록
      description: 콘솔 CRUD 기준 목록. items에는 version과 is_default를 포함한다.
      responses:
        '200':
          description: 모델 정책 목록.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicyList'
        default:
          $ref: '#/components/responses/Error'

  /gateway/policy:
    get:
      tags: [GatewayPolicy]
      operationId: getGatewayPolicy
      summary: LLM 게이트웨이 정책 조회
      description: capabilities는 llm-gateway-adapter.md ModelCapabilities.
      parameters:
        - name: model
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: 모델 정책(model, capabilities, budget, fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [GatewayPolicy]
      operationId: createGatewayPolicy
      summary: LLM 게이트웨이 정책 생성
      description: >
        신규 모델 정책을 생성한다. Idempotency-Key로 중복 제출을 보호하며,
        이미 존재하는 model은 IR_SCHEMA_INVALID(policy_model_in_use)로 거절한다.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayPolicy'
      responses:
        '201':
          description: 생성 정책.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '422':
          $ref: '#/components/responses/Error'        # IR_SCHEMA_INVALID / LLM_CAPABILITY_MISMATCH
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [GatewayPolicy]
      operationId: updateGatewayPolicy
      summary: LLM 게이트웨이 정책 갱신
      description: >
        정책이 capabilities와 모순되게 model/jsonMode 설정 시 LLM_CAPABILITY_MISMATCH(422).
        If-Match(정책 버전) + Idempotency-Key. ETag 대상은
        db/migration_core_entities.sql gateway_policies.version.
      parameters:
        - $ref: '#/components/parameters/IfMatchPolicy'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayPolicy'
      responses:
        '200':
          description: 갱신 정책.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicy'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '412':
          $ref: '#/components/responses/Error'        # POLICY_VERSION_CONFLICT
        '422':
          $ref: '#/components/responses/Error'        # LLM_CAPABILITY_MISMATCH
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [GatewayPolicy]
      operationId: deleteGatewayPolicy
      summary: LLM 게이트웨이 정책 삭제
      description: >
        model 쿼리로 지정한 정책을 If-Match CAS와 Idempotency-Key 보호 아래 삭제한다.
      parameters:
        - name: model
          in: query
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IfMatchPolicy'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 삭제 결과.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPolicyDeleteResponse'
        '403':
          $ref: '#/components/responses/Error'        # AUTHZ_FORBIDDEN
        '404':
          $ref: '#/components/responses/Error'        # RESOURCE_NOT_FOUND
        '412':
          $ref: '#/components/responses/Error'        # POLICY_VERSION_CONFLICT
        default:
          $ref: '#/components/responses/Error'

